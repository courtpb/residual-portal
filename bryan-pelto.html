<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bryan Pelto Portfolio</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
body { font-family: Arial; background:#f4f6f9; margin:0; color:#000; }
header { background:#2c3e50; color:white; padding:15px; }
nav { background:#34495e; padding:10px; }
nav a { color:white; margin-right:15px; text-decoration:none; font-weight:bold; }
.container { padding:25px; }
select, button { padding:10px; margin-right:10px; margin-bottom:20px; }
table { width:100%; border-collapse:collapse; background:white; color:#000; }
th, td { padding:10px; border:1px solid #ddd; color:#000; }
th { background:#2c3e50; color:white; }
#totals { font-weight:bold; margin-bottom:15px; font-size:1.1em; }
</style>
</head>

<body>
<header><h2>Bryan Pelto Portfolio</h2></header>

<nav>
<a href="dashboard.html">Dashboard</a>
<a href="residuals.html">Import Residuals</a>
<a href="merchant-search.html">Merchant Search</a>
<a href="payouts.html">Payouts</a>
<a href="negatives.html">Negatives</a>
<a href="bryan-pelto.html">Bryan Pelto</a>
</nav>

<div class="container">
<label>Select Month:</label>
<select id="monthSelect"></select>
<button onclick="runReport()">Run Report</button>
<button onclick="exportReport()">Export to Excel</button>

<div id="totals"></div>

<table>
<thead>
<tr><th>Merchant Number</th><th>DBA</th><th>Processing Volume</th><th>Residual</th></tr>
</thead>
<tbody id="results"></tbody>
</table>
</div>

<script>
// Bryan Rep Codes
const bryanCodes = ["08040-004","08216-004","08636-003","08630-004"];

// normalize strings for comparison
function normalize(str){
    if(!str) return "";
    return str.toString().replace(/\s/g,'').replace(/-/g,'').toUpperCase();
}

// get all merchants from localStorage
function getAllMerchants(){
    let batches = JSON.parse(localStorage.getItem("residualBatches"))||[];
    let all=[];
    batches.forEach(batch=>{
        batch.merchants.forEach(m=>{
            let month = m.monthYear || "";
            all.push({
                month: month.trim(),
                merchant: m.merchant || "",
                dba: m.dba || "",
                residual: Number(m.total)||0,
                repId: normalize(m.repId),
                SalesVolume: m.SalesVolume || []  // keep even if empty
            });
        });
    });
    return all;
}

// populate month dropdown (independent of SalesVolume)
function populateMonths(){
    let data = getAllMerchants();
    let months = [...new Set(data.map(d=>d.month))];
    months.sort((a,b)=>{
        let [mA,yA] = a.split("/").map(Number);
        let [mB,yB] = b.split("/").map(Number);
        if(yB!==yA) return yB-yA;
        return mB-mA;
    });
    let select = document.getElementById("monthSelect");
    select.innerHTML = "";
    months.forEach(m=>{
        let opt=document.createElement("option");
        opt.value=m; opt.textContent=m;
        select.appendChild(opt);
    });
}

// run report
function runReport(){
    let month = document.getElementById("monthSelect").value.trim();
    if(!month) return;

    let data = getAllMerchants().filter(d=>{
        return bryanCodes.map(normalize).includes(d.repId) && d.month === month;
    });

    if(data.length===0){
        document.getElementById("results").innerHTML = "<tr><td colspan='4'>No data found for this month</td></tr>";
        document.getElementById("totals").innerHTML = "";
        return;
    }

    let totalVolume = 0, totalResidual = 0;
    let results = document.getElementById("results");
    results.innerHTML="";

    data.forEach(d=>{
        let volume = 0;
        if(d.SalesVolume){
            d.SalesVolume.forEach(v=>{
                let val = Number(v);
                if(!isNaN(val)) volume += val;
            });
        }
        totalVolume += volume;
        totalResidual += d.residual;

        let row = document.createElement("tr");
        row.innerHTML = `<td>${d.merchant}</td><td>${d.dba}</td><td>$${volume.toLocaleString()}</td><td>$${d.residual.toFixed(2)}</td>`;
        results.appendChild(row);
    });

    document.getElementById("totals").innerHTML =
        `Total Volume: $${totalVolume.toLocaleString()} | Total Residual: $${totalResidual.toFixed(2)}`;
}

// export to Excel
function exportReport(){
    let month=document.getElementById("monthSelect").value.trim();
    if(!month){ alert("Please run a report first"); return; }
    let data = getAllMerchants().filter(d=>{
        return bryanCodes.map(normalize).includes(d.repId) && d.month===month;
    });
    if(data.length===0){ alert("No data to export"); return; }

    let exportData = data.map(d=>{
        let volume = 0;
        if(d.SalesVolume){
            d.SalesVolume.forEach(v=>{
                let val = Number(v);
                if(!isNaN(val)) volume += val;
            });
        }
        return {
            "Merchant Number": d.merchant,
            "DBA": d.dba,
            "Processing Volume": volume,
            "Residual": d.residual
        };
    });

    let ws = XLSX.utils.json_to_sheet(exportData);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Bryan Pelto");
    XLSX.writeFile(wb, `Bryan_Pelto_${month.replace("/","-")}.xlsx`);
}

populateMonths();
</script>
</body>
</html>
