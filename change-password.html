<!DOCTYPE html>
<html>
<head>

<title>Change Password</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:40px;
}

input{
display:block;
margin:10px 0;
padding:8px;
}

button{
padding:8px 15px;
background:#0073aa;
color:white;
border:none;
}

</style>

</head>

<body>

<h2>Change Password</h2>

Current Password
<input id="current">

New Password
<input id="new">

<button onclick="update()">Update Password</button>

<script>

let users = JSON.parse(localStorage.getItem("users"))

let session = JSON.parse(localStorage.getItem("sessionUser"))

function update(){

let current=document.getElementById("current").value
let newPass=document.getElementById("new").value

let user = users.find(u=>u.email==session.email)

if(user.password!=current){

alert("Wrong password")

return

}

user.password=newPass

localStorage.setItem("users",JSON.stringify(users))

alert("Password Updated")

}

</script>

</body>
</html>
