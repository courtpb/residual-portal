<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Change Password</title>
<style>
body { font-family: Arial; background: #f4f6f9; padding: 40px; }
.nav a { margin-right: 10px; padding: 8px 15px; background: #0073aa; color: white; border-radius: 5px; text-decoration: none; }
.nav a.logout { background: #d00; }
.nav a:hover { background: #005fd1; }
h2 { margin-top: 20px; }
input[type=password] { padding: 8px; width: 250px; margin-bottom: 10px; display: block; border-radius: 4px; border: 1px solid #ccc; }
button { padding: 8px 15px; border-radius: 4px; border: none; background: #0073aa; color: white; cursor: pointer; margin-top: 5px; }
button:hover { background: #005fd1; }
.message { margin-top: 15px; font-weight: bold; }
</style>
</head>
<body>

<div class="nav">
  <a href="dashboard.html">Dashboard</a>
  <a href="residuals.html">Residuals</a>
  <a href="sales-reps.html">Sales Reps</a>
  <a href="users.html">Users</a>
  <a href="my-residuals.html">My Residuals</a>
  <a href="merchant-search.html">Merchant Search</a>
  <a href="change-password.html">Change Password</a>
  <a href="index.html" class="logout">Logout</a>
</div>

<h2>Change Password</h2>

<div>
  <label>Current Password:</label>
  <input type="password" id="currentPassword" placeholder="Enter current password">

  <label>New Password:</label>
  <input type="password" id="newPassword" placeholder="Enter new password">

  <label>Confirm New Password:</label>
  <input type="password" id="confirmPassword" placeholder="Confirm new password">

  <button onclick="changePassword()">Update Password</button>

  <div class="message" id="message"></div>
</div>

<script>
// Demo: simulate logged-in user
let currentUser = JSON.parse(localStorage.getItem("currentUser") || '{"username":"admin","password":"admin123"}');

// For demo, we’ll store users here
if(!localStorage.getItem("users")){
  localStorage.setItem("users", JSON.stringify([currentUser]));
}

function changePassword(){
  const current = document.getElementById("currentPassword").value.trim();
  const newPass = document.getElementById("newPassword").value.trim();
  const confirm = document.getElementById("confirmPassword").value.trim();
  const msg = document.getElementById("message");

  if(!current || !newPass || !confirm){
    msg.style.color = "red";
    msg.textContent = "Please fill in all fields.";
    return;
  }

  if(current !== currentUser.password){
    msg.style.color = "red";
    msg.textContent = "Current password is incorrect.";
    return;
  }

  if(newPass !== confirm){
    msg.style.color = "red";
    msg.textContent = "New passwords do not match.";
    return;
  }

  // Update password
  currentUser.password = newPass;

  // Update in stored users
  let users = JSON.parse(localStorage.getItem("users") || "[]");
  let index = users.findIndex(u => u.username === currentUser.username);
  if(index !== -1){ users[index].password = newPass; }
  localStorage.setItem("users", JSON.stringify(users));
  localStorage.setItem("currentUser", JSON.stringify(currentUser));

  msg.style.color = "green";
  msg.textContent = "Password updated successfully!";

  // Clear input fields
  document.getElementById("currentPassword").value = "";
  document.getElementById("newPassword").value = "";
  document.getElementById("confirmPassword").value = "";
}
</script>

</body>
</html>
