<h2>Dashboard</h2>
<p>Welcome to your portal! Here you can see summary info.</p>

<table>
<thead>
<tr>
<th>Agent</th>
<th>Processing Volume</th>
<th>Residual Income</th>
<th>Month</th>
</tr>
</thead>
<tbody id="dashboardBody"></tbody>
</table>

<script>
let residuals = JSON.parse(localStorage.getItem("residualReports") || "[]");
let reps = JSON.parse(localStorage.getItem("salesReps") || "[]");

function renderDashboard(monthFilter=""){
    const tbody = document.getElementById("dashboardBody");
    tbody.innerHTML="";
    reps.forEach(rep=>{
        let totalVolume=0,totalResidual=0;
        residuals.forEach(r=>{
            // placeholder: backend will calculate volume/residual
        });
        const tr=document.createElement("tr");
        tr.innerHTML=`<td>${rep.firstName} ${rep.lastName}</td>
                      <td>$${totalVolume}</td>
                      <td>$${totalResidual}</td>
                      <td>${monthFilter || "All Months"}</td>`;
        tbody.appendChild(tr);
    });
}

renderDashboard();
</script>
