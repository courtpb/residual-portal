<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<style>
body { font-family: Arial; background:#f4f6f9; padding:40px;}
.nav a {margin-right:10px; padding:8px 15px; background:#0073aa; color:white; border-radius:5px; text-decoration:none;}
.nav a.logout {background:#d00;}
.nav a:hover {background:#005fd1;}
table {width:100%; border-collapse: collapse; margin-top:20px; background:white; border-radius:6px; overflow:hidden;}
th, td {border:1px solid #ddd; padding:8px; text-align:left;}
th {background:#0073aa; color:white;}
</style>
</head>
<body>

<div class="nav">
  <a href="dashboard.html">Dashboard</a>
  <a href="residuals.html">Residuals</a>
  <a href="sales-reps.html">Sales Reps</a>
  <a href="index.html" class="logout">Logout</a>
</div>

<h2>Dashboard</h2>

<h3>Agent Residual Summary</h3>
Month/Year: <input type="month" id="dashMonth" onchange="renderDashboard()">

<table>
<thead>
<tr>
  <th>Agent Name</th>
  <th>Processing Volume</th>
  <th>Residual Income</th>
</tr>
</thead>
<tbody id="dashboardBody"></tbody>
</table>

<script>
// Load residuals and sales reps
let residuals = JSON.parse(localStorage.getItem("residuals") || "[]");
let reps = JSON.parse(localStorage.getItem("salesReps") || "[]");

function renderDashboard(){
  let tbody = document.getElementById("dashboardBody");
  tbody.innerHTML = "";

  let selectedMonth = document.getElementById("dashMonth").value;

  reps.forEach(rep=>{
    // Agent name
    let agentName = rep.firstName + " " + rep.lastName;

    // Filter residuals by month and agent (who matches first or last name)
    let filtered = residuals.filter(r=>r.month === selectedMonth && r.who.includes(rep.firstName));

    // Calculate total residual income for agent
    let totalResidual = 0;
    filtered.forEach(r=>{
      // If rep has multiple codes, calculate total for each code
      rep.codes.forEach(c=>{
        // Simple assumption: all residuals for this agent count for their split
        totalResidual += (c.split/100) * 0; // Placeholder if file had amounts
        // For now, we just show 0, actual calculation requires residual file parsing
      });
    });

    let tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${agentName}</td>
      <td>—</td>
      <td>$${totalResidual.toFixed(2)}</td>
    `;
    tbody.appendChild(tr);
  });
}

// Initial render
renderDashboard();
</script>

</body>
</html>
