<!DOCTYPE html>
<html>
<head>
  <title>Residual Portal Login</title>
  <style>
    body{font-family: Arial; background:#f4f6f9; display:flex; justify-content:center; align-items:center; height:100vh;}
    .login-box{background:white; padding:40px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1); width:320px; text-align:center;}
    input{width:100%; padding:10px; margin:10px 0; border:1px solid #ccc; border-radius:5px;}
    button{width:100%; padding:10px; background:#0073ff; color:white; border:none; border-radius:5px; cursor:pointer;}
    button:hover{background:#005fd1;}
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Residual Portal</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Log In</button>
    <p id="error" style="color:red;"></p>
  </div>

  <script>
    function login(){
      var email = document.getElementById("email").value;
      var password = document.getElementById("password").value;
      // Demo credentials for now
      if(email === "admin@email.com" && password === "portal123"){
        window.location.href = "dashboard.html";
      } else {
        document.getElementById("error").innerText = "Invalid login";
      }
    }
  </script>
</body>
</html>
