<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<style>
body{
font-family:Arial;
background:#f4f6f9;
padding:40px;
}

input{
display:block;
margin:10px 0;
padding:8px;
}

button{
padding:8px 15px;
background:#0073aa;
color:white;
border:none;
}
</style>

</head>

<body>

<h2>Portal Login</h2>

Email
<input id="email">

Password
<input id="password">

<button onclick="login()">Login</button>

<script>

let users = JSON.parse(localStorage.getItem("users") || "[]")

function login(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

let user = users.find(u=>u.email==email && u.password==password)

if(!user){

alert("Invalid Login")

return

}

localStorage.setItem("sessionUser",JSON.stringify(user))

if(user.role=="admin"){

window.location="dashboard.html"

}

if(user.role=="manager"){

window.location="dashboard.html"

}

if(user.role=="rep"){

window.location="my-residuals.html"

}

}

</script>

</body>
</html>
