<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{font-family:Arial;background:#2c3e50;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;}
.box{background:white;padding:30px;border-radius:8px;width:300px;}
input{width:100%;padding:10px;margin:10px 0;}
button{width:100%;padding:10px;background:#3498db;color:white;border:none;cursor:pointer;}
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<script src="users.js"></script>

<script>
function login(){
    let email = document.getElementById("email").value.trim().toLowerCase();
    let password = document.getElementById("password").value;

    let user = USERS.find(u => u.email === email && u.password === password);

    if(user){
        sessionStorage.setItem("loggedInUser", JSON.stringify(user));
        window.location.href = "dashboard.html";
    } else {
        alert("Invalid login");
    }
}
</script>

</body>
</html>
