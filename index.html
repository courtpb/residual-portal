<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{font-family:Arial;background:#2c3e50;display:flex;justify-content:center;align-items:center;height:100vh;}
.box{background:white;padding:30px;border-radius:8px;width:300px;}
input{width:100%;padding:10px;margin:10px 0;}
button{width:100%;padding:10px;background:#3498db;color:white;border:none;}
</style>
</head>
<body>

<div class="box">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<script>
const USERS = [
  {
    email: "admin@email.com",
    password: "admin123",
    role: "admin",
    repCodes: [],
    split: 0
  }
];

function login(){
  let email = document.getElementById("email").value.toLowerCase();
  let password = document.getElementById("password").value;

  let user = USERS.find(u => u.email === email && u.password === password);

  if(user){
    sessionStorage.setItem("user", JSON.stringify(user));
    window.location.href = "dashboard.html";
  } else {
    alert("Invalid login");
  }
}
</script>

</body>
</html>
