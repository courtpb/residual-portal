<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Residual Portal Login</title>
<style>
body {
    font-family: Arial, sans-serif;
    font-size: 18px;
    background-color: #f4f6f9;
    margin: 0;
    padding: 20px;
}
h2 {
    margin-bottom: 20px;
}
input[type=text], input[type=password] {
    padding: 10px;
    font-size: 16px;
    width: 280px;
    border-radius: 4px;
    border: 1px solid #ccc;
    margin-bottom: 10px;
    display: block;
}
button {
    padding: 10px 16px;
    font-size: 16px;
    border: none;
    border-radius: 4px;
    background-color: #0073aa;
    color: white;
    cursor: pointer;
}
button:hover { background-color: #005fd1; }
</style>
</head>
<body>

<h2>Residual Portal Login</h2>

<input type="text" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Log In</button>

<script>
// Always ensure admin exists
const defaultAdmin = {
  email: "admin@email.com",
  password: "portal123",
  permission: "admin",
  assignedRep: null
};

// Load saved users from localStorage
let savedUsers = [];
try {
  savedUsers = JSON.parse(localStorage.getItem("users")) || [];
} catch(e){
  savedUsers = [];
}

// Combine admin with saved users
let users = [defaultAdmin, ...savedUsers];

function login(){
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    const user = users.find(u => u.email === email && u.password === password);

    if(user){
        localStorage.setItem("loggedInUser", JSON.stringify(user));
        window.location.href = "dashboard.html";
    } else {
        alert("Invalid email or password");
    }
}

// Example function for adding new users (for your Users page)
function createUser(email, password, permission, assignedRep){
    if(!email || !password) return;
    let newUser = {email, password, permission, assignedRep};
    users.push(newUser);
    // Save all non-admin users
    const nonAdminUsers = users.filter(u => u.email !== defaultAdmin.email);
    localStorage.setItem("users", JSON.stringify(nonAdminUsers));
}
</script>

</body>
</html>
