<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Merchant Search</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: Arial; background: #f4f6f9; padding: 20px; }
.nav a { margin-right: 10px; padding: 6px 12px; background: #0073aa; color: white; border-radius: 5px; text-decoration: none; font-size: 14px; }
.nav a.logout { background: #d00; }
.nav a:hover { background: #005fd1; }
h2 { margin-top: 20px; }
input[type=text] { padding: 6px; width: 220px; margin-right: 5px; border-radius: 4px; border: 1px solid #ccc; }
button { padding: 6px 12px; border-radius: 4px; border: none; background: #0073aa; color: white; cursor: pointer; }
button:hover { background: #005fd1; }
table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; font-size: 14px; }
th, td { border: 1px solid #ddd; padding: 6px; text-align: left; }
th { background: #0073aa; color: white; }
.total-row { font-weight: bold; background: #eee; }
.graph-container { width: 600px; margin: 10px auto; }
</style>
</head>
<body>

<div class="nav">
  <a href="dashboard.html">Dashboard</a>
  <a href="residuals.html">Residuals</a>
  <a href="sales-reps.html">Sales Reps</a>
  <a href="users.html">Users</a>
  <a href="my-residuals.html">My Residuals</a>
  <a href="merchant-search.html">Merchant Search</a>
  <a href="change-password.html">Change Password</a>
  <a href="index.html" class="logout">Logout</a>
</div>

<h2>Merchant Search</h2>

<div style="margin-bottom:5px;">
  <input type="text" id="merchantInput" placeholder="Enter Merchant ID or DBA">
  <button onclick="searchMerchant()">Search</button>
</div>

<!-- Chart -->
<div class="graph-container">
  <canvas id="merchantChart" width="600" height="250"></canvas>
</div>

<!-- Table -->
<table id="merchantTable">
<thead>
<tr>
  <th>Month/Year</th>
  <th>Residual Name</th>
  <th>Amount</th>
</tr>
</thead>
<tbody id="merchantBody">
<tr><td colspan="3" style="text-align:center;">No residuals found.</td></tr>
</tbody>
<tfoot>
<tr class="total-row">
  <td>Total</td>
  <td colspan="1"></td>
  <td id="merchantTotal">$0</td>
</tr>
<tr class="total-row">
  <td>Average Monthly</td>
  <td colspan="1"></td>
  <td id="merchantAverage">$0</td>
</tr>
</tfoot>
</table>

<script>
let residuals = [
  {month:"2026-03", name:"Residual A", amount:150000, merchantId:"M001"},
  {month:"2026-02", name:"Residual B", amount:200000, merchantId:"M001"},
  {month:"2026-03", name:"Residual C", amount:120000, merchantId:"M002"},
  {month:"2026-01", name:"Residual D", amount:180000, merchantId:"M001"}
];

let chartInstance;

function searchMerchant(){
  const merchantId = document.getElementById("merchantInput").value.trim();
  if(!merchantId){ alert("Please enter a Merchant ID or DBA"); return; }
  const filtered = residuals.filter(r => r.merchantId.toLowerCase() === merchantId.toLowerCase());
  renderTable(filtered);
  renderChart(filtered);
}

function renderTable(data){
  const tbody = document.getElementById("merchantBody");
  const totalCell = document.getElementById("merchantTotal");
  const avgCell = document.getElementById("merchantAverage");
  tbody.innerHTML = "";
  if(data.length===0){
    tbody.innerHTML='<tr><td colspan="3" style="text-align:center;">No residuals found.</td></tr>';
    totalCell.textContent="$0"; avgCell.textContent="$0"; return;
  }
  let total = 0;
  data.sort((a,b)=>b.month.localeCompare(a.month)).forEach(r=>{
    tbody.innerHTML += `<tr>
      <td>${r.month}</td>
      <td>${r.name}</td>
      <td>$${Math.round(r.amount).toLocaleString()}</td>
    </tr>`;
    total += parseFloat(r.amount);
  });
  totalCell.textContent = "$" + Math.round(total).toLocaleString();
  avgCell.textContent = "$" + Math.round(total/data.length).toLocaleString();
}

function renderChart(data){
  const ctx = document.getElementById('merchantChart').getContext('2d');
  const labels = data.map(r=>r.month).reverse();
  const amounts = data.map(r=>Math.round(r.amount)).reverse();
  let maxValue = Math.max(...amounts,100000);
  let yMax = Math.ceil(maxValue/100000)*100000;
  if(chartInstance) chartInstance.destroy();
  chartInstance = new Chart(ctx,{
    type:'bar',
    data:{
      labels: labels,
      datasets:[{label:'Residual Income',data:amounts,backgroundColor:'rgba(0,115,170,0.7)',borderColor:'rgba(0,115,170,1)',borderWidth:1}]
    },
    options:{
      responsive:true,
      scales:{y:{beginAtZero:true,min:0,max:yMax,ticks:{stepSize:100000,callback:function(value){return "$"+value.toLocaleString();}}}}
    }
  });
}
</script>

</body>
</html>
