<!DOCTYPE html>
<html>
<head>

<title>Merchant Search</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:40px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
}

th{
background:#0073aa;
color:white;
}

</style>

</head>

<body>

<h2>Merchant Search</h2>

Search Merchant

<input id="search">

<button onclick="search()">Search</button>

<table>

<thead>

<tr>
<th>Month</th>
<th>Volume</th>
<th>Residual</th>
</tr>

</thead>

<tbody id="results"></tbody>

</table>

<script>

let residuals = JSON.parse(localStorage.getItem("residualData") || [])

function search(){

let merchant=document.getElementById("search").value.toLowerCase()

let results=residuals.filter(r=>r.merchant.toLowerCase().includes(merchant))

let table=document.getElementById("results")

table.innerHTML=""

results.forEach(r=>{

let row=document.createElement("tr")

row.innerHTML=`
<td>${r.month}</td>
<td>${r.volume}</td>
<td>${r.residual}</td>
`

table.appendChild(row)

})

}

</script>

</body>
</html>
