<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merchant Search</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: Arial, sans-serif; font-size:16px; background:#f4f6f9; margin:0; padding:0;}
header { background:#0073aa; color:white; padding:15px 20px; display:flex; justify-content:space-between; align-items:center;}
header h1{margin:0; font-size:20px;}
nav a { color:white; text-decoration:none; margin-right:15px; font-weight:bold; font-size:16px; padding: 8px 12px; border-radius:4px; background:#005f99; }
nav a:hover { background:#004066; }
main { padding:20px; max-width:1200px; margin:0 auto; }
input { padding:8px; font-size:16px; width:250px; }
button { padding:8px 12px; font-size:16px; border:none; border-radius:4px; background:#0073aa; color:white; cursor:pointer; }
button:hover { background:#005fd1; }
table { width:100%; border-collapse:collapse; margin-top:20px; }
th,td { border:1px solid #ccc; padding:8px; text-align:left; }
th { background:#eaeaea; }
</style>
</head>
<body>

<header>
<h1>Residual Portal</h1>
<nav>
    <a href="dashboard.html">Dashboard</a>
    <a href="residuals.html">Residuals</a>
    <a href="sales-reps.html">Sales Reps</a>
    <a href="users.html">Users</a>
    <a href="merchant-search.html">Merchant Search</a>
    <a href="change-password.html">Change Password</a>
    <a href="index.html">Logout</a>
</nav>
</header>

<main>
<h2>Merchant Search</h2>
<input type="text" id="searchInput" placeholder="Enter Merchant ID or DBA">
<button onclick="searchMerchant()">Search</button>

<canvas id="merchantChart" style="max-width:100%;height:250px;margin-top:20px;"></canvas>
<table id="merchantTable">
<thead>
<tr>
    <th>Month/Year</th>
    <th>Merchant #</th>
    <th>DBA</th>
    <th>Sales Rep ID</th>
    <th>Residual Total</th>
    <th>Bucket</th>
</tr>
</thead>
<tbody></tbody>
<tfoot>
<tr>
    <td colspan="4"><strong>Total:</strong></td>
    <td id="merchantTotal"></td>
    <td></td>
</tr>
<tr>
    <td colspan="4"><strong>Average Monthly:</strong></td>
    <td id="merchantAverage"></td>
    <td></td>
</tr>
</tfoot>
</table>
</main>

<script>
const residualBatches = JSON.parse(localStorage.getItem("residualBatches")) || [];

function searchMerchant(){
    const query = document.getElementById("searchInput").value.toLowerCase();
    const allMerchants = [];
    residualBatches.forEach(batch=>{
        batch.merchants.forEach(m=>{
            allMerchants.push({
                monthYear: m.monthYear,
                merchant: m.merchant,
                dba: m.dba,
                repId: m.repId,
                total: parseFloat(m.total||0),
                bucket: batch.bucket
            });
        });
    });
    const results = allMerchants.filter(m=> m.merchant.toLowerCase().includes(query) || m.dba.toLowerCase().includes(query));
    
    const tbody = document.querySelector("#merchantTable tbody");
    tbody.innerHTML="";
    let total=0;
    results.forEach(r=>{
        const tr=document.createElement("tr");
        tr.innerHTML=`
            <td>${r.monthYear}</td>
            <td>${r.merchant}</td>
            <td>${r.dba}</td>
            <td>${r.repId}</td>
            <td>$${r.total.toLocaleString()}</td>
            <td>${r.bucket}</td>
        `;
        total+=r.total;
        tbody.appendChild(tr);
    });
    document.getElementById("merchantTotal").innerText="$"+total.toLocaleString();
    const months = [...new Set(results.map(r=>r.monthYear))];
    const avg = months.length ? (total/months.length) : 0;
    document.getElementById("merchantAverage").innerText="$"+avg.toLocaleString();

    // Chart
    const totalsByMonth = {};
    results.forEach(r=> totalsByMonth[r.monthYear] = (totalsByMonth[r.monthYear]||0)+r.total );
    const sortedMonths = Object.keys(totalsByMonth).sort((a,b)=> new Date(b)-new Date(a));
    const chartData = sortedMonths.map(m=>totalsByMonth[m]);

    const ctx = document.getElementById('merchantChart').getContext('2d');
    if(window.merchantChart) window.merchantChart.destroy();
    window.merchantChart = new Chart(ctx,{
        type:'bar',
        data:{ labels:sortedMonths, datasets:[{label:'Residual Income',data:chartData,backgroundColor:'rgba(0,115,170,0.7)', borderColor:'rgba(0,115,170,1)',borderWidth:1}]},
        options:{ responsive:true, scales:{y:{beginAtZero:true, ticks:{ stepSize:100000, callback:v=>"$"+Number(v).toLocaleString() }}} }
    });
}
</script>

</body>
</html>
