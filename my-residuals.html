<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Residuals</title>

<style>
body{font-family:Arial;background:#f4f6f9;margin:0;}
header{background:#2c3e50;color:white;padding:15px;}
nav{background:#34495e;padding:10px;}
nav a{color:white;margin-right:15px;text-decoration:none;font-weight:bold;}
.container{padding:25px;}
table{width:100%;border-collapse:collapse;margin-top:15px;background:white;}
th,td{padding:10px;border:1px solid #ddd;text-align:left;}
th{background:#ecf0f1;}
.total-row{font-weight:bold;background:#ecf0f1;}
</style>
</head>

<body>
<header>
<h2>Residual Portal</h2>
</header>

<nav>
<a href="dashboard.html">Dashboard</a>
<a href="residuals.html">Import Residuals</a>
<a href="my-residuals.html">My Residuals</a>
<a href="merchant-search.html">Merchant Search</a>
<a href="users.html">Users</a>
<a href="index.html">Logout</a>
</nav>

<div class="container">

<h3>My Residuals</h3>

<table id="residualTable">
<thead>
<tr>
<th>Month/Year</th>
<th>Merchant ID</th>
<th>DBA</th>
<th>Sales Rep ID</th>
<th>Bucket</th>
<th>Residual Total</th>
</tr>
</thead>
<tbody></tbody>
<tfoot>
<tr class="total-row">
<td colspan="5">Total</td>
<td id="totalResidual">$0</td>
</tr>
<tr class="total-row">
<td colspan="5">Average Monthly</td>
<td id="avgResidual">$0</td>
</tr>
</tfoot>
</table>

</div>

<script>
function loadResiduals(){
    let tbody = document.querySelector("#residualTable tbody")
    tbody.innerHTML=""
    let batches = JSON.parse(localStorage.getItem("residualBatches")) || []
    let allResiduals = []

    batches.forEach(batch=>{
        batch.merchants.forEach(m=>{
            // If you want to restrict by sales rep login, add logic here
            allResiduals.push({
                monthYear: m.monthYear,
                merchant: m.merchant,
                dba: m.dba,
                repId: m.repId,
                bucket: batch.bucket,
                total: m.total
            })
        })
    })

    // Sort most recent first
    allResiduals.sort((a,b)=>{
        let [aMonth,aYear] = a.monthYear.split("/")
        let [bMonth,bYear] = b.monthYear.split("/")
        return new Date(bYear,aMonth-1) - new Date(aYear,bMonth-1)
    })

    let totalResidual = 0
    allResiduals.forEach(r=>{
        let row = document.createElement("tr")
        row.innerHTML = `<td>${r.monthYear}</td>
                         <td>${r.merchant}</td>
                         <td>${r.dba}</td>
                         <td>${r.repId}</td>
                         <td>${r.bucket}</td>
                         <td>$${r.total.toFixed(2)}</td>`
        tbody.appendChild(row)
        totalResidual += r.total
    })

    let avgResidual = allResiduals.length ? totalResidual / allResiduals.length : 0
    document.getElementById("totalResidual").innerText = "$" + totalResidual.toFixed(2)
    document.getElementById("avgResidual").innerText = "$" + avgResidual.toFixed(2)
}

loadResiduals()
</script>

</body>
</html>
