<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Residuals</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: Arial, sans-serif; font-size:16px; background:#f4f6f9; margin:0; padding:0;}
header { background:#0073aa; color:white; padding:15px 20px; display:flex; justify-content:space-between; align-items:center;}
header h1{margin:0; font-size:20px;}
nav a { color:white; text-decoration:none; margin-right:15px; font-weight:bold; font-size:16px; padding: 8px 12px; border-radius:4px; background:#005f99; }
nav a:hover { background:#004066; }
main { padding:20px; max-width:1200px; margin:0 auto; }
table { width:100%; border-collapse:collapse; margin-top:20px; }
th,td { border:1px solid #ccc; padding:8px; text-align:left; }
th { background:#eaeaea; }
</style>
</head>
<body>

<header>
<h1>Residual Portal</h1>
<nav>
    <a href="dashboard.html">Dashboard</a>
    <a href="residuals.html">Residuals</a>
    <a href="sales-reps.html">Sales Reps</a>
    <a href="users.html">Users</a>
    <a href="merchant-search.html">Merchant Search</a>
    <a href="change-password.html">Change Password</a>
    <a href="index.html">Logout</a>
</nav>
</header>

<main>
<h2>My Residuals</h2>
<canvas id="residualChart" style="max-width:100%;height:250px;"></canvas>
<table id="residualTable">
<thead>
<tr>
    <th>Month/Year</th>
    <th>Merchant #</th>
    <th>DBA</th>
    <th>Sales Rep ID</th>
    <th>Residual Total</th>
    <th>Bucket</th>
</tr>
</thead>
<tbody></tbody>
<tfoot>
<tr>
    <td colspan="4"><strong>Total:</strong></td>
    <td id="grandTotal"></td>
    <td></td>
</tr>
</tfoot>
</table>
</main>

<script>
// === Set current user role ===
const currentUser = {
    role: 'admin', // 'admin' or 'salesrep'
    repId: ''      // fill in if sales rep
};

// Load batches from localStorage
const residualBatches = JSON.parse(localStorage.getItem("residualBatches")) || [];
let allMerchants = [];

// Flatten all merchants from all batches
residualBatches.forEach(batch => {
    batch.merchants.forEach(m => {
        allMerchants.push({
            monthYear: m.monthYear,
            merchant: m.merchant,
            dba: m.dba,
            repId: m.repId,
            total: parseFloat(m.total || 0),
            bucket: batch.bucket
        });
    });
});

// Filter by role
const visibleMerchants = currentUser.role==='admin' ? allMerchants : allMerchants.filter(m=>m.repId===currentUser.repId);

// Aggregate totals per month for chart
const totalsByMonth = {};
visibleMerchants.forEach(m=>{
    totalsByMonth[m.monthYear] = (totalsByMonth[m.monthYear] || 0) + m.total;
});

// Chart
const ctx = document.getElementById('residualChart').getContext('2d');
const sortedMonths = Object.keys(totalsByMonth).sort((a,b)=>new Date(b)-new Date(a));
const chartData = sortedMonths.map(m=>totalsByMonth[m]);
new Chart(ctx,{
    type:'bar',
    data:{ labels:sortedMonths, datasets:[{label:'Residual Income', data:chartData, backgroundColor:'rgba(0,115,170,0.7)', borderColor:'rgba(0,115,170,1)', borderWidth:1}]},
    options:{ responsive:true, scales:{ y:{ beginAtZero:true, ticks:{ stepSize:100000, callback: v=>"$"+Number(v).toLocaleString() }}} }
});

// Populate table
const tbody = document.querySelector("#residualTable tbody");
let grandTotal=0;
visibleMerchants.forEach(m=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`
        <td>${m.monthYear}</td>
        <td>${m.merchant}</td>
        <td>${m.dba}</td>
        <td>${m.repId}</td>
        <td>$${m.total.toLocaleString()}</td>
        <td>${m.bucket}</td>
    `;
    grandTotal += m.total;
    tbody.appendChild(tr);
});
document.getElementById("grandTotal").innerText="$"+grandTotal.toLocaleString();
</script>

</body>
</html>
