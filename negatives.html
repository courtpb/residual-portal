<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Negative Residuals</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    body { font-family: Arial; background:#f4f6f9; margin:0; }
    header { background:#2c3e50; color:white; padding:15px; }
    nav { background:#34495e; padding:10px; }
    nav a { color:white; margin-right:15px; text-decoration:none; font-weight:bold; }
    .container { padding:25px; }

    select, button { padding:10px; margin-right:10px; margin-bottom:20px; }

    table {
      width:100%;
      border-collapse:collapse;
      background:white;
    }

    th, td {
      padding:10px;
      border:1px solid #ddd;
      text-align:left;
    }

    th { background:#2c3e50; color:white; }

    #totalNegative {
      font-weight:bold;
      font-size:1.2em;
      margin-bottom:10px;
    }
  </style>
</head>

<body>

<header>
<h2>Negative Residuals</h2>
</header>

<nav>
  <a href="dashboard.html">Dashboard</a>
  <a href="residuals.html">Import Residuals</a>
  <a href="my-residuals.html">My Residuals</a>
  <a href="merchant-search.html">Merchant Search</a>
  <a href="payouts.html">Payouts</a>
  <a href="negatives.html">Negatives</a>
  <a href="users.html">Users</a>
  <a href="index.html">Logout</a>
</nav>

<div class="container">

<label>Select Month:</label>
<select id="monthSelect"></select>
<button onclick="runReport()">Run Report</button>
<button onclick="exportReport()">Export to Excel</button>

<div id="totalNegative">Total Negative Residuals: $0.00</div>

<table>
  <thead>
    <tr>
      <th>Merchant Number</th>
      <th>DBA</th>
      <th>Residual</th>
      <th>Rep Name</th>
    </tr>
  </thead>
  <tbody id="results"></tbody>
</table>

</div>

<script>
// 🔹 REP CONFIG
const reps = [
  { name: "Bryan Pelto", codes: ["08040-004","08216-004","08636-003","08630-004"] },
  { name: "Pat Pascua", codes: ["08040-003","08216-003","08636-002","08630-003"] },
  { name: "Che Pascua", codes: ["08040-007","08216-007","08636-004","08630-007"] },
  { name: "Mike Lature", codes: ["08040-009","08630-009"] },
  { name: "Sal Nashal", codes: ["08040-008","08630-008"] },
  { name: "Scott Coleman", codes: ["08040-006","08630-006"] },
  { name: "Walter Noriega", codes: ["08040-010"] },
  { name: "Shawn Grieve", codes: ["08040-011"] }
];

// 🔹 GET ALL MERCHANT DATA
function getAllMerchants(){
  let batches = JSON.parse(localStorage.getItem("residualBatches")) || [];
  let all = [];
  batches.forEach(batch => {
    batch.merchants.forEach(m => {
      all.push({
        month: m.monthYear,
        merchant: m.merchant,
        dba: m.dba,
        residual: Number(m.total),
        repId: m.repId
      });
    });
  });
  return all;
}

// 🔹 FIND REP NAME BY CODE
function findRepByCode(code){
  let rep = reps.find(r => r.codes.includes(code));
  return rep ? rep.name : "Unknown";
}

// 🔹 POPULATE MONTH DROPDOWN MOST RECENT FIRST
function populateMonths(){
  let data = getAllMerchants();
  let months = [...new Set(data.map(d => d.month))];
  months.sort((a,b)=>{
    let [yA,mA] = a.split("/").map(Number);
    let [yB,mB] = b.split("/").map(Number);
    if(yB !== yA) return yB - yA;
    return mB - mA;
  });
  let monthSelect = document.getElementById("monthSelect");
  monthSelect.innerHTML = "";
  months.forEach(m=>{
    let opt = document.createElement("option");
    opt.value = m;
    opt.textContent = m;
    monthSelect.appendChild(opt);
  });
}

// 🔹 RUN REPORT
function runReport(){
  let selectedMonth = document.getElementById("monthSelect").value;
  if(!selectedMonth) return;

  let data = getAllMerchants()
    .filter(d => d.month === selectedMonth && d.residual < 0);

  let results = document.getElementById("results");
  results.innerHTML = "";

  // 🔹 Calculate total negative
  let totalNegative = data.reduce((sum, d) => sum + d.residual, 0);
  document.getElementById("totalNegative").innerText = 
      `Total Negative Residuals: $${totalNegative.toFixed(2)}`;

  data.forEach(d=>{
    let row = document.createElement("tr");
    row.innerHTML = `
      <td>${d.merchant}</td>
      <td>${d.dba}</td>
      <td>$${d.residual.toFixed(2)}</td>
      <td>${findRepByCode(d.repId)}</td>
    `;
    results.appendChild(row);
  });
}

// 🔹 EXPORT TO EXCEL
function exportReport(){
  let table = document.querySelector("table");
  let wb = XLSX.utils.table_to_book(table, { sheet:"Negatives" });
  XLSX.writeFile(wb, "Negative_Residuals.xlsx");
}

// Initialize
populateMonths();
</script>

</body>
</html>
