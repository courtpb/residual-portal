<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Payouts Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    body { font-family: Arial; background:#f4f6f9; margin:0; }
    header { background:#2c3e50; color:white; padding:15px; }
    nav { background:#34495e; padding:10px; }
    nav a { color:white; margin-right:15px; text-decoration:none; font-weight:bold; }
    .container { padding:25px; }

    select, button { padding:10px; margin-right:10px; margin-bottom:20px; }

    table {
      width:100%;
      border-collapse:collapse;
      background:white;
    }

    th, td {
      padding:10px;
      border:1px solid #ddd;
      vertical-align: top;
    }

    th { background:#2c3e50; color:white; }

    input.additional {
      width:120px;
      padding:5px;
      margin-bottom:5px;
      display:block;
    }

    .additional-row {
      display:flex;
      gap:5px;
      margin-bottom:5px;
    }

    #grandTotal {
      margin-top:20px;
      font-weight:bold;
      font-size:1.1em;
    }

    button.addAdditional {
      margin-top:5px;
      padding:5px 10px;
      font-size:0.9em;
    }
  </style>
</head>

<body>

<header>
<h2>Payouts Dashboard</h2>
</header>

<nav>
  <a href="dashboard.html">Dashboard</a>
  <a href="residuals.html">Import Residuals</a>
  <a href="my-residuals.html">My Residuals</a>
  <a href="merchant-search.html">Merchant Search</a>
  <a href="payouts.html">Payouts</a>
  <a href="users.html">Users</a>
  <a href="index.html">Logout</a>
</nav>

<div class="container">

<label>Select Month:</label>
<select id="monthSelect"></select>
<button onclick="runReport()">Run Report</button>
<button onclick="exportReport()">Export to Excel</button>

<table>
  <thead>
    <tr>
      <th>Agent</th>
      <th>Total Residual</th>
      <th>Split</th>
      <th>Payout</th>
      <th>Additional</th>
      <th>Additional Amount</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="results"></tbody>
</table>

<div id="grandTotal"></div>

</div>

<script>
// 🔥 REP CONFIG (YOUR DATA)
const reps = [
  { name: "Bryan Pelto", codes: ["08040-004","08216-004","08636-003","08630-004"], split: 0.15 },
  { name: "Pat Pascua", codes: ["08040-003","08216-003","08636-002","08630-003"], split: 0.15 },
  { name: "Che Pascua", codes: ["08040-007","08216-007","08636-004","08630-007"], split: 0.15 },
  { name: "Mike Lature", codes: ["08040-009","08630-009"], split: 0.65 },
  { name: "Sal Nashal", codes: ["08040-008","08630-008"], split: 0.70 },
  { name: "Scott Coleman", codes: ["08040-006","08630-006"], split: 0.70 },
  { name: "Walter Noriega", codes: ["08040-010"], split: 0.70 },
  { name: "Shawn Grieve", codes: ["08040-011"], split: 0.60 }
];

// 🔥 ADDITIONAL STORAGE KEY
const BONUS_KEY = "payoutBonuses";

// 🔥 GET ALL MERCHANT DATA FROM STORAGE
function getAllMerchants(){
  let batches = JSON.parse(localStorage.getItem("residualBatches")) || [];
  let all = [];
  batches.forEach(batch => {
    batch.merchants.forEach(m => {
      all.push({
        repId: m.repId,
        residual: Number(m.total),
        month: m.monthYear
      });
    });
  });
  return all;
}

// 🔹 POPULATE MONTH DROPDOWN MOST RECENT FIRST
function populateMonths(){
  let data = getAllMerchants();
  let months = [...new Set(data.map(d => d.month))];
  months.sort((a,b)=>{
    let [yA,mA] = a.split("/").map(Number);
    let [yB,mB] = b.split("/").map(Number);
    return new Date(yB,mB-1) - new Date(yA,mA-1);
  });

  let monthSelect = document.getElementById("monthSelect");
  monthSelect.innerHTML = "";
  months.forEach(m=>{
    let opt = document.createElement("option");
    opt.value = m;
    opt.textContent = m;
    monthSelect.appendChild(opt);
  });
}

// 🔹 LOAD BONUS DATA
function loadBonus(repName, month){
  let allBonus = JSON.parse(localStorage.getItem(BONUS_KEY)) || {};
  return allBonus[month]?.[repName] || [];
}

// 🔹 SAVE BONUS DATA
function saveBonus(repName, month){
  let allBonus = JSON.parse(localStorage.getItem(BONUS_KEY)) || {};
  if(!allBonus[month]) allBonus[month] = {};
  let rows = document.querySelectorAll(`.additional-container-${repName} .additional-row`);
  let newBonuses = [];
  rows.forEach(row=>{
    let name = row.querySelector(".additional-name").value;
    let amount = parseFloat(row.querySelector(".additional-amount").value)||0;
    if(name || amount) newBonuses.push({name, amount});
  });
  allBonus[month][repName] = newBonuses;
  localStorage.setItem(BONUS_KEY, JSON.stringify(allBonus));
  runReport(); // recalc totals
}

// 🔹 ADD NEW ADDITIONAL ROW
function addAdditionalRow(repName){
  let container = document.querySelector(`.additional-container-${repName}`);
  let row = document.createElement("div");
  row.className = "additional-row";
  row.innerHTML = `
    <input class="additional additional-name" type="text" placeholder="Additional">
    <input class="additional additional-amount" type="number" min="0" value="0">
  `;
  container.appendChild(row);
}

// 🔥 MAIN REPORT
function runReport(){
  let data = getAllMerchants();
  let selectedMonth = document.getElementById("monthSelect").value;
  let results = document.getElementById("results");
  let grandTotal = 0;
  results.innerHTML = "";

  reps.forEach(rep=>{
    let total = data
      .filter(d => rep.codes.includes(d.repId) && d.month === selectedMonth)
      .reduce((sum,d)=>sum + d.residual, 0);

    let bonuses = loadBonus(rep.name, selectedMonth);
    let bonusSum = bonuses.reduce((s,b)=>s+b.amount,0);
    let payout = total * rep.split + bonusSum;
    grandTotal += payout;

    // Generate HTML for additional bonuses
    let bonusContainerId = `additional-container-${rep.name}`;
    let bonusHTML = `<div class="additional-container-${rep.name}"></div>`;
    
    results.innerHTML += `
      <tr>
        <td>${rep.name}</td>
        <td>$${total.toFixed(2)}</td>
        <td>${rep.split*100}%</td>
        <td>$${payout.toFixed(2)}</td>
        <td colspan="2">${bonusHTML}</td>
        <td>
          <button onclick="addAdditionalRow('${rep.name}')">Add</button>
          <button onclick="saveBonus('${rep.name}','${selectedMonth}')">Save</button>
        </td>
      </tr>
    `;

    // Populate existing bonuses
    let container = document.querySelector(`.additional-container-${rep.name}`);
    bonuses.forEach(b=>{
      let row = document.createElement("div");
      row.className = "additional-row";
      row.innerHTML = `
        <input class="additional additional-name" type="text" value="${b.name}" placeholder="Additional">
        <input class="additional additional-amount" type="number" min="0" value="${b.amount}">
      `;
      container.appendChild(row);
    });
  });

  document.getElementById("grandTotal").innerHTML =
    `Total Paid Out (including additionals): $${grandTotal.toFixed(2)}`;
}

// 🔹 EXPORT TO EXCEL
function exportReport(){
  let table = document.querySelector("table");
  let wb = XLSX.utils.table_to_book(table, { sheet:"Payouts" });
  XLSX.writeFile(wb, "Payout_Report.xlsx");
}

// Initialize month dropdown
populateMonths();
</script>

</body>
</html>
