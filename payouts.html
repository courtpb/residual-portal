<!DOCTYPE html>
<html>
<head>
  <title>Payouts Dashboard</title>
  <style>
    body { font-family: Arial; background:#f4f6f9; margin:0; }
    header { background:#2c3e50; color:white; padding:15px; }
    nav { background:#34495e; padding:10px; }
    nav a { color:white; margin-right:15px; text-decoration:none; font-weight:bold; }
    .container { padding:25px; }

    select, button {
      padding:10px;
      margin-right:10px;
      margin-bottom:20px;
    }

    table {
      width:100%;
      border-collapse:collapse;
      background:white;
    }

    th, td {
      padding:10px;
      border:1px solid #ddd;
    }

    th {
      background:#2c3e50;
      color:white;
    }
  </style>
</head>

<body>

<header>
<h2>Payouts Dashboard</h2>
</header>

<nav>
<a href="dashboard.html">Dashboard</a>
<a href="residuals.html">Import Residuals</a>
<a href="merchant-search.html">Merchant Search</a>
<a href="payouts.html">Payouts</a>
</nav>

<div class="container">

<select id="viewMode">
  <option value="month">By Month (All Reps)</option>
  <option value="rep">By Rep (All Months)</option>
</select>

<select id="monthSelect"></select>
<select id="repSelect"></select>

<button onclick="runReport()">Run Report</button>

<table>
  <thead>
    <tr>
      <th>Agent</th>
      <th>Total Residual</th>
      <th>Split</th>
      <th>Payout</th>
    </tr>
  </thead>
  <tbody id="results"></tbody>
</table>

</div>

<script>
// 🔥 REP CONFIG (YOUR DATA)
const reps = [
  { name: "Bryan Pelto", codes: ["08040-004","08216-004","08636-003","08630-004"], split: 0.15 },
  { name: "Pat Pascua", codes: ["08040-003","08216-003","08636-002","08630-003"], split: 0.15 },
  { name: "Che Pascua", codes: ["08040-007","08216-007","08636-004","08630-007"], split: 0.15 },
  { name: "Mike Lature", codes: ["08040-009","08630-009"], split: 0.65 },
  { name: "Sal Nashal", codes: ["08040-008","08630-008"], split: 0.70 },
  { name: "Scott Coleman", codes: ["08040-006","08630-006"], split: 0.70 },
  { name: "Walter Noriega", codes: ["08040-010"], split: 0.70 },
  { name: "Shawn Grieve", codes: ["08040-011"], split: 0.60 }
];

// 🔥 GET ALL MERCHANT DATA FROM STORAGE
function getAllMerchants(){
  let batches = JSON.parse(localStorage.getItem("residualBatches")) || [];
  let all = [];

  batches.forEach(batch => {
    batch.merchants.forEach(m => {
      all.push({
        repId: m.repId,
        residual: Number(m.total),
        month: m.monthYear
      });
    });
  });

  return all;
}

// 🔹 Populate dropdowns
function populateFilters(){
  let data = getAllMerchants();

  let months = [...new Set(data.map(d => d.month))];
  let monthSelect = document.getElementById("monthSelect");
  monthSelect.innerHTML = "";
  months.forEach(m=>{
    let opt = document.createElement("option");
    opt.value = m;
    opt.textContent = m;
    monthSelect.appendChild(opt);
  });

  let repSelect = document.getElementById("repSelect");
  repSelect.innerHTML = "";
  reps.forEach((r,i)=>{
    let opt = document.createElement("option");
    opt.value = i;
    opt.textContent = r.name;
    repSelect.appendChild(opt);
  });
}

// 🔥 MAIN REPORT
function runReport(){
  let data = getAllMerchants();
  let mode = document.getElementById("viewMode").value;
  let results = document.getElementById("results");
  results.innerHTML = "";

  if(mode === "month"){
    let selectedMonth = document.getElementById("monthSelect").value;

    reps.forEach(rep=>{
      let total = data
        .filter(d => rep.codes.includes(d.repId) && d.month === selectedMonth)
        .reduce((sum,d)=>sum + d.residual, 0);

      if(total > 0){
        let payout = total * rep.split;

        results.innerHTML += `
          <tr>
            <td>${rep.name}</td>
            <td>$${total.toFixed(2)}</td>
            <td>${rep.split*100}%</td>
            <td>$${payout.toFixed(2)}</td>
          </tr>
        `;
      }
    });

  } else {
    let rep = reps[document.getElementById("repSelect").value];

    let grouped = {};

    data.forEach(d=>{
      if(rep.codes.includes(d.repId)){
        if(!grouped[d.month]) grouped[d.month]=0;
        grouped[d.month]+=d.residual;
      }
    });

    Object.keys(grouped).forEach(month=>{
      let total = grouped[month];
      let payout = total * rep.split;

      results.innerHTML += `
        <tr>
          <td>${rep.name} (${month})</td>
          <td>$${total.toFixed(2)}</td>
          <td>${rep.split*100}%</td>
          <td>$${payout.toFixed(2)}</td>
        </tr>
      `;
    });
  }
}

// INIT
populateFilters();
</script>

</body>
</html>
