<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Portfolio Summary</title>

<style>
body{
    font-family:Arial;
    background:#f4f6f9;
    margin:0;
}

header{
    background:#2c3e50;
    color:white;
    padding:15px;
}

nav{
    background:#34495e;
    padding:10px;
}

nav a{
    color:white;
    margin-right:15px;
    text-decoration:none;
    font-weight:bold;
}

.container{
    padding:20px;
}

.cards{
    display:flex;
    gap:20px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.card{
    background:white;
    padding:20px;
    border-radius:8px;
    min-width:220px;
    box-shadow:0 2px 5px rgba(0,0,0,.15);
}

.card h3{
    margin:0 0 10px 0;
}

.card-value{
    font-size:24px;
    font-weight:bold;
}

table{
    width:100%;
    background:white;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    border:1px solid #ddd;
}

th{
    background:#2c3e50;
    color:white;
}
</style>
</head>

<body>

<header>
<h2>Portfolio Summary</h2>
</header>

<nav>
  <a href="dashboard.html">Dashboard</a>
  <a href="residuals.html">Import Residuals</a>
  <a href="my-residuals.html">My Residuals</a>
  <a href="merchant-search.html">Merchant Search</a>
  <a href="payouts.html">Payouts</a>
  <a href="portfolio-summary.html">Portfolio Summary</a>
  <a href="negatives.html">Negatives</a>
  <a href="users.html">Users</a>
  <a href="index.html">Logout</a>
</nav>

<div class="container">

<div class="cards">

<div class="card">
<h3>Total Residuals</h3>
<div id="totalResiduals" class="card-value">$0.00</div>
</div>

<div class="card">
<h3>Total Volume</h3>
<div id="totalVolume" class="card-value">$0.00</div>
</div>

<div class="card">
<h3>Total Accounts</h3>
<div id="totalAccounts" class="card-value">0</div>
</div>

</div>

<table>
<thead>
<tr>
<th>Month</th>
<th>Residuals</th>
<th>Volume</th>
<th>Accounts</th>
<th>Avg Residual</th>
</tr>
</thead>
<tbody id="summaryBody"></tbody>
</table>

</div>

<script>

function getData() {

    let batches =
        JSON.parse(localStorage.getItem("residualBatches")) || [];

    let all = [];

    batches.forEach(batch => {

        batch.merchants.forEach(m => {

            let volume =

                Number(m.Mastercard || 0) +
                Number(m.Visa || 0) +
                Number(m.Discover_Acquiring || 0) +
                Number(m.Amex_Opt_Blue || 0) +
                Number(m.EBT || 0) +
                Number(m["Accel Debit"] || 0) +
                Number(m["Interlink Debit"] || 0) +
                Number(m["Maestro Debit"] || 0) +
                Number(m["Pulse Debit"] || 0) +
                Number(m["Star Debit"] || 0);

            all.push({

                month: m.monthYear || "",

                merchant:
                    m.merchantNumber ||
                    m.MerchantNumber ||
                    m.mid ||
                    "",

                residual:
                    Number(m.total || 0),

                volume:
                    volume

            });

        });

    });

    return all;
}

function buildReport(){

    let data = getData();

    let monthly = {};

    let totalResidual = 0;
    let totalVolume = 0;

    data.forEach(row => {

        if(!monthly[row.month]){

            monthly[row.month] = {

                residual:0,
                volume:0,
                merchants:new Set()

            };

        }

        monthly[row.month].residual += row.residual;
        monthly[row.month].volume += row.volume;

        monthly[row.month].merchants.add(
            row.merchant
        );

        totalResidual += row.residual;
        totalVolume += row.volume;

    });

    let uniqueAccounts =
        new Set(data.map(x => x.merchant));

    document.getElementById("totalResiduals").innerHTML =
        "$" + totalResidual.toLocaleString(undefined,{minimumFractionDigits:2});

    document.getElementById("totalVolume").innerHTML =
        "$" + totalVolume.toLocaleString(undefined,{minimumFractionDigits:2});

    document.getElementById("totalAccounts").innerHTML =
        uniqueAccounts.size;

    let html = "";

    Object.keys(monthly).sort().forEach(month => {

        let residual =
            monthly[month].residual;

        let volume =
            monthly[month].volume;

        let accounts =
            monthly[month].merchants.size;

        let avg =
            accounts > 0
            ? residual / accounts
            : 0;

        html += `
        <tr>
            <td>${month}</td>
            <td>$${residual.toFixed(2)}</td>
            <td>$${volume.toFixed(2)}</td>
            <td>${accounts}</td>
            <td>$${avg.toFixed(2)}</td>
        </tr>
        `;

    });

    document.getElementById("summaryBody").innerHTML =
        html;

}

buildReport();

</script>

</body>
</html>
