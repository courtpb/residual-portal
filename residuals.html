<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Import Residuals</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;background:#f4f6f9;margin:0;}
header{background:#2c3e50;color:white;padding:15px;}
nav{background:#34495e;padding:10px;}
nav a{color:white;margin-right:15px;text-decoration:none;font-weight:bold;}
.container{padding:25px;}
button{background:#3498db;border:none;color:white;padding:10px 18px;cursor:pointer;border-radius:4px;}
button:hover{background:#2980b9;}
table{width:100%;border-collapse:collapse;margin-top:25px;background:white;}
th,td{padding:10px;border:1px solid #ddd;text-align:left;}
th{background:#ecf0f1;}
</style>
</head>

<body>

<header>
<h2>Residual Portal</h2>
</header>

<nav>
<a href="dashboard.html">Dashboard</a>
<a href="residuals.html">Import Residuals</a>
<a href="my-residuals.html">My Residuals</a>
<a href="merchant-search.html">Merchant Search</a>
<a href="payouts.html">Payouts</a>
<a href="negatives.html">Negatives</a>
<a href="bryan-pelto.html">Bryan Pelto</a>
<a href="users.html">Users</a>
<a href="index.html">Logout</a>
</nav>

<div class="container">

<h3>Import Residual File</h3>

<label>Residual Month/Year:</label>
<input type="month" id="residualMonth">
<br><br>

<label>Bucket:</label>
<select id="bucket">
<option value="Direct">Direct</option>
<option value="ISO">ISO</option>
<option value="Agent">Agent</option>
</select>

<br><br>
<input type="file" id="fileUpload">
<br><br>

<button onclick="importFile()">Upload Residual File</button>

<h3>Uploaded Files</h3>

<table id="batchTable">
<thead>
<tr>
<th>Select</th>
<th>Month</th>
<th>Bucket</th>
<th>Merchants</th>
</tr>
</thead>
<tbody></tbody>
</table>

<br>
<button onclick="deleteSelected()">Delete Selected</button>

</div>

<script>

// 🔹 LOAD BATCHES
function loadBatches(){
    let batches = JSON.parse(localStorage.getItem("residualBatches")) || []

    batches.sort((a,b)=>{
        let [mA,yA] = a.month.split("/").map(Number)
        let [mB,yB] = b.month.split("/").map(Number)
        if(yA !== yB) return yA - yB
        return mA - mB
    })

    let tbody = document.querySelector("#batchTable tbody")
    tbody.innerHTML=""

    batches.forEach((batch,i)=>{
        let row = document.createElement("tr")
        row.innerHTML = `
        <td><input type="checkbox" data-index="${i}"></td>
        <td>${batch.month}</td>
        <td>${batch.bucket}</td>
        <td>${batch.merchants.length}</td>`
        tbody.appendChild(row)
    })
}

// 🔥 IMPORT FILE (FULL FIXED VERSION)
function importFile(){

    let file = document.getElementById("fileUpload").files[0]
    let monthInput = document.getElementById("residualMonth").value
    let bucket = document.getElementById("bucket").value

    if(!file){ alert("Upload a file"); return }
    if(!monthInput){ alert("Select a month"); return }

    let parts = monthInput.split("-")
    let selectedMonthYear = parts[1] + "/" + parts[0]

    let reader = new FileReader()

    reader.onload = function(e){

        let data = new Uint8Array(e.target.result)
        let workbook = XLSX.read(data,{type:"array"})
        let sheet = workbook.Sheets[workbook.SheetNames[0]]
        let range = XLSX.utils.decode_range(sheet['!ref'])

        let merchants = []

        // 🔹 HEADER MAP (VERY IMPORTANT)
        let headerMap = {}
        for(let C=range.s.c; C<=range.e.c; C++){
            let addr = XLSX.utils.encode_cell({r:0,c:C})
            let cell = sheet[addr]
            if(cell && cell.v){
                let key = cell.v.toString().toLowerCase().trim()
                headerMap[key] = C
            }
        }

        // 🔹 REQUIRED COLUMNS
        let residualCol = headerMap['residual']
        let merchantCol = headerMap['merchant number']
        let dbaCol = headerMap['dba']
        let repCol = headerMap['sales rep id'] || headerMap['iwf workflow sales rep number']

        if(residualCol === undefined){
            alert("Residual column not found")
            return
        }

        // 🔥 SALES + RETURN HEADERS (MATCH YOUR FILE)
        const salesCols = [
          'mastercard','visa','discover_acquiring','amex_opt_blue',
          'ebt','accel debit','interlink debit','maestro debit','pulse debit','star debit'
        ];

        const returnCols = [
          'mastercard return','visa return','discover_acquiring return','amex_opt_blue return'
        ];

        for(let R=1; R<=range.e.r; R++){

            let getCell = (colIdx)=>{
                let addr = XLSX.utils.encode_cell({r:R,c:colIdx})
                return sheet[addr] ? sheet[addr].v : 0
            }

            let merchant = getCell(merchantCol)
            if(!merchant) continue

            let dba = getCell(dbaCol)
            let repId = getCell(repCol)

            let residualVal = getCell(residualCol)
            let residual = !isNaN(residualVal) ? Number(residualVal) : 0

            // 🔥 CALCULATE SALES
            let salesVolume = 0
            salesCols.forEach(col=>{
                let idx = headerMap[col]
                if(idx !== undefined){
                    let val = getCell(idx)
                    if(!isNaN(val)) salesVolume += Number(val)
                }
            })

            // 🔥 CALCULATE RETURNS
            let returnVolume = 0
            returnCols.forEach(col=>{
                let idx = headerMap[col]
                if(idx !== undefined){
                    let val = getCell(idx)
                    if(!isNaN(val)) returnVolume += Number(val)
                }
            })

            let processingVolume = salesVolume - returnVolume

            merchants.push({
                monthYear: selectedMonthYear,
                merchant: merchant,
                dba: dba,
                repId: repId,
                total: residual,
                volume: processingVolume
            })
        }

        let batches = JSON.parse(localStorage.getItem("residualBatches")) || []

        batches.push({
            batchId: Date.now(),
            month: selectedMonthYear,
            bucket: bucket,
            merchants: merchants
        })

        localStorage.setItem("residualBatches", JSON.stringify(batches))

        loadBatches()
        alert("Import successful")
    }

    reader.readAsArrayBuffer(file)
}

// 🔹 DELETE
function deleteSelected(){
    let batches = JSON.parse(localStorage.getItem("residualBatches")) || []
    let checks = document.querySelectorAll("input[type=checkbox]:checked")

    let indexes = []
    checks.forEach(c=>indexes.push(parseInt(c.dataset.index)))

    indexes.sort((a,b)=>b-a)
    indexes.forEach(i=>batches.splice(i,1))

    localStorage.setItem("residualBatches", JSON.stringify(batches))
    loadBatches()
}

// INIT
loadBatches()

</script>

</body>
</html>
