<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Import Residuals</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
body{font-family:Arial;background:#f4f6f9;margin:0;}
header{background:#2c3e50;color:white;padding:15px;}
nav{background:#34495e;padding:10px;}
nav a{color:white;margin-right:15px;text-decoration:none;font-weight:bold;}
.container{padding:25px;}
button{background:#3498db;border:none;color:white;padding:10px 18px;cursor:pointer;border-radius:4px;}
button:hover{background:#2980b9;}
table{width:100%;border-collapse:collapse;margin-top:25px;background:white;}
th,td{padding:10px;border:1px solid #ddd;text-align:left;}
th{background:#ecf0f1;}
</style>
</head>
<body>

<header><h2>Residual Portal</h2></header>

<nav>
<a href="dashboard.html">Dashboard</a>
<a href="residuals.html">Import Residuals</a>
<a href="my-residuals.html">My Residuals</a>
<a href="merchant-search.html">Merchant Search</a>
<a href="payouts.html">Payouts</a>
<a href="negatives.html">Negatives</a>
<a href="bryan-pelto.html">Bryan Pelto</a>
<a href="users.html">Users</a>
<a href="index.html">Logout</a>
</nav>

<div class="container">
<h3>Import Residual File</h3>

<label>Residual Month/Year:</label>
<input type="month" id="residualMonth">
<br><br>

<label>Bucket:</label>
<select id="bucket">
<option value="Direct">Direct</option>
<option value="ISO">ISO</option>
<option value="Agent">Agent</option>
</select>
<br><br>

<input type="file" id="fileUpload">
<br><br>

<button onclick="importFile()">Upload Residual File</button>

<h3>Uploaded Files</h3>
<table id="batchTable">
<thead>
<tr><th>Select</th><th>Month</th><th>Bucket</th><th>Merchants</th></tr>
</thead>
<tbody></tbody>
</table>
<br>
<button onclick="deleteSelected()">Delete Selected</button>
</div>

<script>
// Load existing batches
function loadBatches(){
    let batches = JSON.parse(localStorage.getItem("residualBatches")) || [];
    let tbody = document.querySelector("#batchTable tbody");
    tbody.innerHTML = "";
    batches.forEach((batch,i)=>{
        let row = document.createElement("tr");
        row.innerHTML = `<td><input type="checkbox" data-index="${i}"></td>
                         <td>${batch.month}</td>
                         <td>${batch.bucket}</td>
                         <td>${batch.merchants.length}</td>`;
        tbody.appendChild(row);
    });
}

// Import file
function importFile(){
    let file = document.getElementById("fileUpload").files[0];
    let monthInput = document.getElementById("residualMonth").value;
    let bucket = document.getElementById("bucket").value;
    if(!file){ alert("Upload a file"); return; }
    if(!monthInput){ alert("Select a month"); return; }

    let parts = monthInput.split("-");
    let selectedMonthYear = parts[1] + "/" + parts[0];
    let reader = new FileReader();

    reader.onload = function(e){
        let data = new Uint8Array(e.target.result);
        let workbook = XLSX.read(data,{type:"array"});
        let sheet = workbook.Sheets[workbook.SheetNames[0]];
        let range = XLSX.utils.decode_range(sheet['!ref']);

        // Row 2 (r:1) = actual headers
        let headers = [];
        for(let C=range.s.c; C<=range.e.c; C++){
            let addr = XLSX.utils.encode_cell({r:1,c:C});
            let val = sheet[addr]?.v?.toString().toLowerCase().trim() || "";
            headers.push({name:val,index:C});
        }

        let merchantCol = headers.find(h=>h.name.includes("merchant number"))?.index;
        let dbaCol = headers.find(h=>h.name.includes("merchant name") || h.name.includes("dba"))?.index;
        let residualCol = headers.find(h=>h.name.includes("residual"))?.index;
        let repCol = headers.find(h=>h.name.includes("sales rep id") || h.name.includes("iworkflow sales rep number"))?.index;

        if(residualCol===undefined){ alert("Residual column not found"); return; }

        const volumeColumns = ["mastercard","visa","discover_acquiring","amex_opt_blue","ebt",
                               "accel debit","interlink debit","maestro debit","pulse debit","star debit"];
        let volumeIndexes = headers.filter(h=>volumeColumns.includes(h.name)).map(h=>h.index);

        let merchants = [];
        for(let R=2; R<=range.e.r; R++){
            let getCell = c=>{
                let addr = XLSX.utils.encode_cell({r:R,c:c});
                let val = sheet[addr]?.v;
                if(!val) return 0;
                if(typeof val==="string") val = val.replace(/,/g,'');
                return Number(val)||0;
            };
            let merchant = sheet[XLSX.utils.encode_cell({r:R,c:merchantCol})]?.v;
            if(!merchant) continue;
            let dba = sheet[XLSX.utils.encode_cell({r:R,c:dbaCol})]?.v || "";
            let residual = getCell(residualCol);
            let volume = volumeIndexes.reduce((sum,i)=>sum+getCell(i),0);
            let repIdVal = sheet[XLSX.utils.encode_cell({r:R,c:repCol})]?.v;
            repIdVal = repIdVal ? repIdVal.toString().trim().replace(/\s/g,'') : "";

            merchants.push({
                monthYear:selectedMonthYear,
                merchant:merchant,
                dba:dba,
                repId:repIdVal,
                total:residual,
                volume:volume
            });
        }

        let batches = JSON.parse(localStorage.getItem("residualBatches"))||[];
        batches.push({batchId:Date.now(),month:selectedMonthYear,bucket:bucket,merchants:merchants});
        localStorage.setItem("residualBatches",JSON.stringify(batches));
        loadBatches();
        alert("Import successful");
    };

    reader.readAsArrayBuffer(file);
}

// Delete selected
function deleteSelected(){
    let batches = JSON.parse(localStorage.getItem("residualBatches"))||[];
    let checks = document.querySelectorAll("input[type=checkbox]:checked");
    let indexes = Array.from(checks).map(c=>parseInt(c.dataset.index));
    indexes.sort((a,b)=>b-a).forEach(i=>batches.splice(i,1));
    localStorage.setItem("residualBatches",JSON.stringify(batches));
    loadBatches();
}

// Init
loadBatches();
</script>
</body>
</html>
