<!DOCTYPE html>
<html>
<head>
<title>Residuals</title>
<style>
body{font-family:Arial;background:#f4f6f9;padding:40px;}
.nav a{margin-right:10px;padding:8px 15px;background:#0073aa;color:white;border-radius:5px;text-decoration:none;}
.nav a.logout{background:#d00;}
.nav a:hover{background:#005fd1;}
input,button{padding:5px;margin:5px 0;}
table{width:100%;border-collapse:collapse;margin-top:20px;background:white;}
th,td{border:1px solid #ddd;padding:8px;text-align:left;}
th{background:#0073aa;color:white;}
</style>
</head>
<body>

<!-- NAVIGATION -->
<div class="nav">
<a href="dashboard.html">Dashboard</a>
<a href="residuals.html">Residuals</a>
<a href="sales-reps.html">Sales Reps</a>
<a href="users.html">Users</a>
<a href="my-residuals.html">My Residuals</a>
<a href="merchant-search.html">Merchant Search</a>
<a href="change-password.html">Change Password</a>
<a href="index.html" class="logout">Logout</a>
</div>

<h2>Residuals Upload</h2>

Residual Month/Year: <input type="month" id="resMonth"><br>
Residual Name / Bucket: <input type="text" id="resName"><br>
Upload File: <input type="file" id="resFile"><br>
<button onclick="addResidualReport()">Upload</button>

<table>
<thead>
<tr>
<th>Report Name</th>
<th>Month/Year</th>
<th>File Name</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="residualBody"></tbody>
</table>

<script>
let residualReports = JSON.parse(localStorage.getItem("residualReports") || "[]");

function renderResiduals(){
    const tbody=document.getElementById("residualBody");
    tbody.innerHTML="";
    residualReports.forEach((r,i)=>{
        const tr=document.createElement("tr");
        tr.innerHTML=`<td>${r.name}</td>
                      <td>${r.month}</td>
                      <td>${r.fileName}</td>
                      <td><button onclick="deleteResidual(${i})">Delete</button></td>`;
        tbody.appendChild(tr);
    });
}

function addResidualReport(){
    const month=document.getElementById("resMonth").value;
    const name=document.getElementById("resName").value.trim();
    const file=document.getElementById("resFile").files[0];
    if(!month || !name || !file){alert("Fill all fields and select a file");return;}
    residualReports.push({month,name,fileName:file.name});
    localStorage.setItem("residualReports",JSON.stringify(residualReports));
    renderResiduals();
    document.getElementById("resMonth").value="";
    document.getElementById("resName").value="";
    document.getElementById("resFile").value="";
}

function deleteResidual(i){
    if(confirm("Delete this report?")){residualReports.splice(i,1);localStorage.setItem("residualReports",JSON.stringify(residualReports));renderResiduals();}
}

renderResiduals();
</script>

</body>
</html>
