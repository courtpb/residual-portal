<!DOCTYPE html>
<html>
<head>
<title>Residuals</title>
<style>
body{font-family:Arial;background:#f4f6f9;padding:40px;}
.nav a{margin-right:10px;padding:8px 15px;background:#0073aa;color:white;border-radius:5px;text-decoration:none;}
.nav a.logout{background:#d00;}
.nav a:hover{background:#005fd1;}
table{width:100%;border-collapse:collapse;margin-top:20px;background:white;}
th,td{border:1px solid #ddd;padding:8px;text-align:left;}
th{background:#0073aa;color:white;}
input{padding:5px;margin:2px;}
button{padding:5px 8px;background:#0073aa;color:white;border:none;border-radius:5px;}
button:hover{background:#005fd1;}
</style>
</head>
<body>

<!-- NAVIGATION -->
<div class="nav">
<a href="dashboard.html">Dashboard</a>
<a href="residuals.html">Residuals</a>
<a href="sales-reps.html">Sales Reps</a>
<a href="users.html">Users</a>
<a href="my-residuals.html">My Residuals</a>
<a href="merchant-search.html">Merchant Search</a>
<a href="change-password.html">Change Password</a>
<a href="index.html" class="logout">Logout</a>
</div>

<h2>Residuals</h2>

<h3>Import Residual</h3>
Residual Month/Year: <input type="month" id="resMonth"><br>
Residual Name: <input type="text" id="resName"><br>
Merchant Name: <input type="text" id="resMerchant"><br>
Rep Code: <input type="text" id="resRep"><br>
Processing Volume: <input type="number" id="resVolume"><br>
Residual Amount: <input type="number" id="resResidual"><br>
<button onclick="addResidual()">Add Residual</button>

<table>
<thead>
<tr>
<th>Name</th>
<th>Month</th>
<th>Merchant</th>
<th>Rep Code</th>
<th>Volume</th>
<th>Residual</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="residualBody"></tbody>
</table>

<script>
let residualData = JSON.parse(localStorage.getItem("residualData") || "[]");

function renderResiduals(){
    const tbody = document.getElementById("residualBody");
    tbody.innerHTML="";
    residualData.forEach((r,i)=>{
        const tr=document.createElement("tr");
        tr.innerHTML=`<td>${r.name}</td>
                      <td>${r.month}</td>
                      <td>${r.merchant}</td>
                      <td>${r.rep}</td>
                      <td>$${r.volume}</td>
                      <td>$${r.residual}</td>
                      <td><button onclick="deleteResidual(${i})">Delete</button></td>`;
        tbody.appendChild(tr);
    });
}

function addResidual(){
    let r = {
        name: document.getElementById("resName").value,
        month: document.getElementById("resMonth").value,
        merchant: document.getElementById("resMerchant").value,
        rep: document.getElementById("resRep").value,
        volume: parseFloat(document.getElementById("resVolume").value),
        residual: parseFloat(document.getElementById("resResidual").value)
    };
    residualData.push(r);
    localStorage.setItem("residualData",JSON.stringify(residualData));
    renderResiduals();
}

function deleteResidual(i){
    residualData.splice(i,1);
    localStorage.setItem("residualData",JSON.stringify(residualData));
    renderResiduals();
}

renderResiduals();
</script>

</body>
</html>
