<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Import Residuals</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

header{
background:#2c3e50;
color:white;
padding:15px;
}

nav{
background:#34495e;
padding:10px;
}

nav a{
color:white;
margin-right:15px;
text-decoration:none;
font-weight:bold;
}

.container{
padding:25px;
}

button{
background:#3498db;
border:none;
color:white;
padding:10px 18px;
cursor:pointer;
border-radius:4px;
}

button:hover{
background:#2980b9;
}

table{
width:100%;
border-collapse:collapse;
margin-top:25px;
background:white;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:left;
}

th{
background:#ecf0f1;
}

</style>
</head>

<body>

<header>
<h2>Residual Portal</h2>
</header>

<nav>
<a href="dashboard.html">Dashboard</a>
<a href="residuals.html">Import Residuals</a>
<a href="my-residuals.html">My Residuals</a>
<a href="merchant-search.html">Merchant Search</a>
<a href="users.html">Users</a>
<a href="index.html">Logout</a>
</nav>

<div class="container">

<h3>Import Residual File</h3>

<br>

<label>Residual Month/Year:</label>
<input type="month" id="residualMonth">

<br><br>

<label>Bucket:</label>

<select id="bucket">

<option value="Direct">Direct</option>
<option value="ISO">ISO</option>
<option value="Agent">Agent</option>

</select>

<br><br>

<input type="file" id="fileUpload">

<br><br>

<button onclick="importFile()">Upload Residual File</button>

<h3>Uploaded Files</h3>

<table id="batchTable">

<thead>

<tr>
<th>Select</th>
<th>Month</th>
<th>Bucket</th>
<th>Merchants</th>
</tr>

</thead>

<tbody></tbody>

</table>

<br>

<button onclick="deleteSelected()">Delete Selected</button>

</div>

<script>

function loadBatches(){

let batches = JSON.parse(localStorage.getItem("residualBatches")) || []

let tbody = document.querySelector("#batchTable tbody")

tbody.innerHTML=""

batches.forEach((batch,i)=>{

let row = document.createElement("tr")

row.innerHTML = `
<td><input type="checkbox" data-index="${i}"></td>
<td>${batch.month}</td>
<td>${batch.bucket}</td>
<td>${batch.merchants.length}</td>
`

tbody.appendChild(row)

})

}

function importFile(){

let file = document.getElementById("fileUpload").files[0]

let month = document.getElementById("residualMonth").value

let bucket = document.getElementById("bucket").value

if(!file){
alert("Please upload a file")
return
}

let reader = new FileReader()

reader.onload = function(e){

let data = new Uint8Array(e.target.result)

let workbook = XLSX.read(data,{type:"array"})

let sheet = workbook.Sheets[workbook.SheetNames[0]]

let rows = XLSX.utils.sheet_to_json(sheet,{header:1})

let merchants = []

for(let i=2;i<rows.length;i++){

let row = rows[i]

if(!row) continue

let monthYear = row[0] || ""
let merchant = row[1] || ""
let dba = row[2] || ""
let repId = row[12] || ""
let residual = row[407] || 0

if(merchant){

merchants.push({

monthYear:monthYear,
merchant:merchant,
dba:dba,
repId:repId,
total:parseFloat(residual)

})

}

}

let batches = JSON.parse(localStorage.getItem("residualBatches")) || []

batches.push({

batchId:Date.now(),
month:month,
bucket:bucket,
merchants:merchants

})

localStorage.setItem("residualBatches",JSON.stringify(batches))

loadBatches()

alert("Residual file imported successfully")

}

reader.readAsArrayBuffer(file)

}

function deleteSelected(){

let batches = JSON.parse(localStorage.getItem("residualBatches")) || []

let checks = document.querySelectorAll("input[type=checkbox]:checked")

let indexes = []

checks.forEach(c=>{

indexes.push(parseInt(c.dataset.index))

})

indexes.sort((a,b)=>b-a)

indexes.forEach(i=>{

batches.splice(i,1)

})

localStorage.setItem("residualBatches",JSON.stringify(batches))

loadBatches()

}

loadBatches()

</script>

</body>
</html>
