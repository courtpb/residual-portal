<!DOCTYPE html>
<html>
<head>
<title>Sales Rep Manager</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:40px;
}

.nav a{
margin-right:10px;
padding:8px 15px;
background:#0073aa;
color:white;
border-radius:5px;
text-decoration:none;
}

.nav a.logout{
background:#d00;
}

input{
padding:8px;
margin:4px;
}

button{
padding:8px 12px;
background:#0073aa;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#005fd1;
}

.rep-card{
background:white;
padding:15px;
margin-top:20px;
border-radius:8px;
box-shadow:0 0 5px rgba(0,0,0,.1);
}

.code-row{
margin-top:8px;
}

</style>
</head>


<body>

<div class="nav">
<a href="dashboard.html">Dashboard</a>
<a href="residuals.html">Residuals</a>
<a href="sales-reps.html">Sales Reps</a>
<a href="index.html" class="logout">Logout</a>
</div>

<h2>Create Sales Rep</h2>

<input id="first" placeholder="First Name">
<input id="last" placeholder="Last Name">

<button onclick="createRep()">Create Rep</button>

<div id="repList"></div>

<script>

let reps = JSON.parse(localStorage.getItem("reps") || "[]")

function save(){
localStorage.setItem("reps",JSON.stringify(reps))
render()
}

function createRep(){

let first=document.getElementById("first").value
let last=document.getElementById("last").value

if(!first || !last){
alert("Enter first and last name")
return
}

reps.push({
first:first,
last:last,
codes:[]
})

document.getElementById("first").value=""
document.getElementById("last").value=""

save()
}

function addCode(repIndex){

let code=document.getElementById("code-"+repIndex).value
let split=document.getElementById("split-"+repIndex).value

if(!code || !split){
alert("Enter code and split")
return
}

reps[repIndex].codes.push({
code:code,
split:split
})

save()
}

function updateRep(repIndex){

reps[repIndex].first=document.getElementById("repFirst-"+repIndex).value
reps[repIndex].last=document.getElementById("repLast-"+repIndex).value

save()
}

function updateCode(repIndex,codeIndex){

reps[repIndex].codes[codeIndex].code=
document.getElementById("repCode-"+repIndex+"-"+codeIndex).value

reps[repIndex].codes[codeIndex].split=
document.getElementById("repSplit-"+repIndex+"-"+codeIndex).value

save()
}

function deleteCode(repIndex,codeIndex){

reps[repIndex].codes.splice(codeIndex,1)

save()
}

function deleteRep(repIndex){

if(confirm("Delete this rep?")){
reps.splice(repIndex,1)
save()
}

}

function render(){

let container=document.getElementById("repList")
container.innerHTML=""

reps.forEach((rep,repIndex)=>{

let div=document.createElement("div")
div.className="rep-card"

let html=`

<h3>Sales Rep</h3>

First Name:
<input id="repFirst-${repIndex}" value="${rep.first}">

Last Name:
<input id="repLast-${repIndex}" value="${rep.last}">

<button onclick="updateRep(${repIndex})">Save Rep</button>
<button onclick="deleteRep(${repIndex})">Delete Rep</button>

<h4>Rep Codes</h4>

`

rep.codes.forEach((c,codeIndex)=>{

html+=`

<div class="code-row">

Code:
<input id="repCode-${repIndex}-${codeIndex}" value="${c.code}">

Split %:
<input id="repSplit-${repIndex}-${codeIndex}" value="${c.split}">

<button onclick="updateCode(${repIndex},${codeIndex})">Save</button>
<button onclick="deleteCode(${repIndex},${codeIndex})">Delete</button>

</div>

`

})

html+=`

<br>

<input id="code-${repIndex}" placeholder="New Rep Code">
<input id="split-${repIndex}" placeholder="Split %">

<button onclick="addCode(${repIndex})">Add Code</button>

`

div.innerHTML=html
container.appendChild(div)

})

}

render()

</script>

</body>
</html>
