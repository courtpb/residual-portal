<!DOCTYPE html>
<html>
<head>
<title>Sales Reps</title>
<style>
body{font-family:Arial;background:#f4f6f9;padding:40px;}
.nav a{margin-right:10px;padding:8px 15px;background:#0073aa;color:white;border-radius:5px;text-decoration:none;}
.nav a.logout{background:#d00;}
.nav a:hover{background:#005fd1;}
table{width:100%;border-collapse:collapse;margin-top:20px;background:white;}
th,td{border:1px solid #ddd;padding:8px;text-align:left;}
th{background:#0073aa;color:white;}
input,button{padding:5px;margin:3px;}
.code-group{display:flex;gap:5px;margin-bottom:3px;}
</style>
</head>
<body>

<!-- NAVIGATION -->
<div class="nav">
<a href="dashboard.html">Dashboard</a>
<a href="residuals.html">Residuals</a>
<a href="payouts.html">Payouts</a>
<a href="sales-reps.html">Sales Reps</a>
<a href="users.html">Users</a>
<a href="my-residuals.html">My Residuals</a>
<a href="merchant-search.html">Merchant Search</a>
<a href="change-password.html">Change Password</a>
<a href="index.html" class="logout">Logout</a>
</div>

<h2>Sales Rep Settings</h2>

<h3>Add New Sales Rep</h3>
First Name: <input id="repFirst" placeholder="First Name">
Last Name: <input id="repLast" placeholder="Last Name">

<div id="codesContainer">
<div class="code-group">
Rep Code: <input class="repCode" placeholder="Code">
Split %: <input class="repSplit" type="number" min="0" max="100" placeholder="Split %">
</div>
</div>

<button onclick="addCodeInput()">+ Add Another Code</button>
<button onclick="addRep()">Add Sales Rep</button>

<table>
<thead>
<tr>
<th>First Name</th>
<th>Last Name</th>
<th>Codes & Splits</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="repBody"></tbody>
</table>

<script>
let reps = JSON.parse(localStorage.getItem("salesReps") || "[]");

function renderTable(){
    const tbody = document.getElementById("repBody");
    tbody.innerHTML="";
    reps.forEach((rep,i)=>{
        const codesText = rep.codes.map(c=>`${c.code}:${c.split}%`).join(", ");
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${rep.firstName}</td>
                        <td>${rep.lastName}</td>
                        <td>${codesText}</td>
                        <td>
                        <button onclick="editRep(${i})">Edit</button>
                        <button onclick="deleteRep(${i})">Delete</button>
                        </td>`;
        tbody.appendChild(tr);
    });
}

function addCodeInput(){
    const container = document.getElementById("codesContainer");
    const div = document.createElement("div");
    div.className="code-group";
    div.innerHTML=`Rep Code: <input class="repCode" placeholder="Code"> Split %: <input class="repSplit" type="number" min="0" max="100" placeholder="Split %">`;
    container.appendChild(div);
}

function addRep(){
    const first=document.getElementById("repFirst").value.trim();
    const last=document.getElementById("repLast").value.trim();
    if(!first || !last){alert("Enter first and last name");return;}
    const codeInputs=document.querySelectorAll("#codesContainer .code-group");
    const codes=[];
    codeInputs.forEach(ci=>{
        const code=ci.querySelector(".repCode").value.trim();
        const split=parseFloat(ci.querySelector(".repSplit").value);
        if(code && !isNaN(split)) codes.push({code,split});
    });
    if(codes.length===0){alert("Add at least one rep code with split");return;}
    reps.push({firstName:first,lastName:last,codes});
    localStorage.setItem("salesReps",JSON.stringify(reps));
    renderTable();
    document.getElementById("repFirst").value="";
    document.getElementById("repLast").value="";
    document.getElementById("codesContainer").innerHTML=`<div class="code-group">
    Rep Code: <input class="repCode" placeholder="Code">
    Split %: <input class="repSplit" type="number" min="0" max="100" placeholder="Split %">
    </div>`;
}

function deleteRep(i){if(confirm("Delete this rep?")){reps.splice(i,1);localStorage.setItem("salesReps",JSON.stringify(reps));renderTable();}}

function editRep(i){
    const tbody=document.getElementById("repBody");
    const tr=tbody.children[i];
    const rep=reps[i];
    const codesHtml=rep.codes.map((c,j)=>`<div class="code-group">
    Code: <input class="editCode" data-index="${j}" value="${c.code}" style="width:60px;">
    Split %: <input class="editSplit" data-index="${j}" type="number" min="0" max="100" value="${c.split}" style="width:50px;">
    </div>`).join("");
    tr.innerHTML=`<td><input id="editFirst" value="${rep.firstName}"></td>
                  <td><input id="editLast" value="${rep.lastName}"></td>
                  <td id="editCodes">${codesHtml}<br><button onclick="addNewCode(${i})">+ Add Code</button></td>
                  <td>
                  <button onclick="saveEdit(${i})">Save</button>
                  <button onclick="cancelEdit()">Cancel</button>
                  </td>`;
}

function addNewCode(i){reps[i].codes.push({code:"",split:0});editRep(i);}
function saveEdit(i){
    const tr=document.getElementById("repBody").children[i];
    const rep=reps[i];
    rep.firstName=document.getElementById("editFirst").value.trim();
    rep.lastName=document.getElementById("editLast").value.trim();
    const codeInputs=tr.querySelectorAll(".editCode");
    const splitInputs=tr.querySelectorAll(".editSplit");
    rep.codes=[];
    codeInputs.forEach((ci,j)=>{
        const code=ci.value.trim();
        const split=parseFloat(splitInputs[j].value);
        if(code && !isNaN(split)) rep.codes.push({code,split});
    });
    localStorage.setItem("salesReps",JSON.stringify(reps));
    renderTable();
}
function cancelEdit(){renderTable();}

renderTable();
</script>

</body>
</html>
