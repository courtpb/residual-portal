<!DOCTYPE html>
<html>
<head>
  <title>Sales Reps Management</title>
  <style>
    body{font-family: Arial; background:#f4f6f9; padding:40px;}
    h2{color:#333;}
    input, button{padding:10px; margin:5px 0;}
    table{width:100%; border-collapse:collapse; background:white; border-radius:6px; overflow:hidden; margin-top:20px;}
    th, td{padding:10px; border:1px solid #ddd;}
    th{background:#0073aa; color:white;}
    button{background:#0073aa; color:white; border:none; border-radius:5px; cursor:pointer;}
    button:hover{background:#005fd1;}
    .nav a{margin-right:10px; padding:8px 15px; background:#0073aa; color:white; border-radius:5px; text-decoration:none;}
    .nav a.logout{background:#d00;}
    .form-group{margin-bottom:10px;}
  </style>
</head>
<body>

<!-- Navigation -->
<div class="nav">
  <a href="dashboard.html">Dashboard</a>
  <a href="residuals.html">Residuals</a>
  <a href="sales-reps.html">Sales Reps</a>
  <a href="index.html" class="logout">Logout</a>
</div>

<h2>Sales Reps</h2>

<div class="form-group">
  <input type="text" id="rep-first" placeholder="First Name">
  <input type="text" id="rep-last" placeholder="Last Name">
  <input type="text" id="rep-id" placeholder="Rep ID">
</div>

<div class="form-group">
  <input type="text" id="sales-id" placeholder="Sales ID">
  <input type="number" id="split" placeholder="Residual Split %" min="0" max="100">
  <button onclick="addSalesID()">Add Sales ID</button>
</div>

<table>
  <thead>
    <tr>
      <th>Rep Name</th>
      <th>Rep ID</th>
      <th>Sales ID</th>
      <th>Residual Split %</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="reps-table"></tbody>
</table>

<script>
let currentRep = null; // holds current rep being edited

function addSalesID(){
  const first = document.getElementById("rep-first").value.trim();
  const last = document.getElementById("rep-last").value.trim();
  const repID = document.getElementById("rep-id").value.trim();
  const salesID = document.getElementById("sales-id").value.trim();
  const split = document.getElementById("split").value.trim();

  if(!first || !last || !repID || !salesID || !split){
    alert("Fill all fields");
    return;
  }

  const tbody = document.getElementById("reps-table");
  const tr = document.createElement("tr");
  tr.innerHTML = `<td>${first} ${last}</td><td>${repID}</td><td>${salesID}</td><td>${split}</td>
                  <td><button onclick="this.closest('tr').remove()">Delete</button></td>`;
  tbody.appendChild(tr);

  // Clear sales ID and split fields only, keep rep info for multiple entries
  document.getElementById("sales-id").value="";
  document.getElementById("split").value="";
}
</script>

</body>
</html>
