<!DOCTYPE html>
<html>
<head>
<title>Sales Rep Manager</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:40px;
}

.nav a{
margin-right:10px;
padding:8px 15px;
background:#0073aa;
color:white;
border-radius:5px;
text-decoration:none;
}

.nav a.logout{
background:#d00;
}

input,button{
padding:8px;
margin:4px;
}

button{
background:#0073aa;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#005fd1;
}

.rep-card{
background:white;
padding:15px;
margin-top:20px;
border-radius:8px;
box-shadow:0 0 5px rgba(0,0,0,.1);
}

.code-row{
margin-top:6px;
}

</style>
</head>


<body>

<div class="nav">
<a href="dashboard.html">Dashboard</a>
<a href="residuals.html">Residuals</a>
<a href="sales-reps.html">Sales Reps</a>
<a href="index.html" class="logout">Logout</a>
</div>


<h2>Create Sales Rep</h2>

<input id="first" placeholder="First Name">
<input id="last" placeholder="Last Name">
<input id="repid" placeholder="Rep ID">

<button onclick="createRep()">Create Rep</button>


<div id="repList"></div>



<script>

let reps = JSON.parse(localStorage.getItem("reps") || "[]")

function save(){
localStorage.setItem("reps",JSON.stringify(reps))
render()
}


function createRep(){

let first=document.getElementById("first").value
let last=document.getElementById("last").value
let id=document.getElementById("repid").value

if(!first||!last||!id){
alert("Fill all fields")
return
}

reps.push({
first:first,
last:last,
id:id,
codes:[]
})

document.getElementById("first").value=""
document.getElementById("last").value=""
document.getElementById("repid").value=""

save()

}



function addCode(repIndex){

let code=prompt("Enter Rep Code")
let split=prompt("Enter Split %")

if(!code||!split)return

reps[repIndex].codes.push({
code:code,
split:split
})

save()

}



function editCode(repIndex,codeIndex){

let newSplit=prompt("New Split %",reps[repIndex].codes[codeIndex].split)

if(newSplit){
reps[repIndex].codes[codeIndex].split=newSplit
save()
}

}



function deleteCode(repIndex,codeIndex){

reps[repIndex].codes.splice(codeIndex,1)

save()

}



function editRep(repIndex){

let rep=reps[repIndex]

let newFirst=prompt("First Name",rep.first)
let newLast=prompt("Last Name",rep.last)

if(newFirst)rep.first=newFirst
if(newLast)rep.last=newLast

save()

}



function deleteRep(repIndex){

if(confirm("Delete this rep?")){
reps.splice(repIndex,1)
save()
}

}



function render(){

let container=document.getElementById("repList")

container.innerHTML=""

reps.forEach((rep,repIndex)=>{

let div=document.createElement("div")

div.className="rep-card"

let html=`

<h3>${rep.first} ${rep.last} (ID: ${rep.id})</h3>

<button onclick="editRep(${repIndex})">Edit Rep</button>
<button onclick="deleteRep(${repIndex})">Delete Rep</button>
<button onclick="addCode(${repIndex})">Add Rep Code</button>

`

rep.codes.forEach((c,codeIndex)=>{

html+=`

<div class="code-row">

Rep Code: <b>${c.code}</b>  
Split: <b>${c.split}%</b>

<button onclick="editCode(${repIndex},${codeIndex})">Edit</button>
<button onclick="deleteCode(${repIndex},${codeIndex})">Delete</button>

</div>

`

})

div.innerHTML=html

container.appendChild(div)

})

}

render()

</script>

</body>
</html>
