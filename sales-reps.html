<!DOCTYPE html>
<html>
<head>
<title>Sales Rep Manager</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:40px;
}

.nav a{
margin-right:10px;
padding:8px 15px;
background:#0073aa;
color:white;
border-radius:5px;
text-decoration:none;
}

.nav a.logout{
background:#d00;
}

input{
padding:6px;
margin:4px;
}

button{
padding:6px 10px;
background:#0073aa;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#005fd1;
}

.rep-card{
background:white;
padding:20px;
margin-top:20px;
border-radius:8px;
box-shadow:0 0 5px rgba(0,0,0,.1);
}

.code-row{
margin-top:8px;
}

</style>
</head>

<body>

<div class="nav">
<a href="dashboard.html">Dashboard</a>
<a href="residuals.html">Residuals</a>
<a href="sales-reps.html">Sales Reps</a>
<a href="index.html" class="logout">Logout</a>
</div>

<h2>Add Sales Rep</h2>

<input id="firstName" placeholder="First Name">
<input id="lastName" placeholder="Last Name">

<button onclick="addRep()">Add Rep</button>

<div id="repContainer"></div>


<script>

let reps = JSON.parse(localStorage.getItem("reps") || "[]")

function saveData(){
localStorage.setItem("reps",JSON.stringify(reps))
render()
}

function addRep(){

let first=document.getElementById("firstName").value
let last=document.getElementById("lastName").value

if(!first || !last){
alert("Enter first and last name")
return
}

reps.push({
first:first,
last:last,
codes:[]
})

document.getElementById("firstName").value=""
document.getElementById("lastName").value=""

saveData()

}

function updateRep(repIndex){

reps[repIndex].first =
document.getElementById("repFirst-"+repIndex).value

reps[repIndex].last =
document.getElementById("repLast-"+repIndex).value

saveData()

}

function deleteRep(repIndex){

if(confirm("Delete this rep?")){
reps.splice(repIndex,1)
saveData()
}

}

function addRepCode(repIndex){

let code=document.getElementById("newCode-"+repIndex).value
let split=document.getElementById("newSplit-"+repIndex).value

if(!code || !split){
alert("Enter rep code and split")
return
}

reps[repIndex].codes.push({
code:code,
split:split
})

saveData()

}

function updateCode(repIndex,codeIndex){

reps[repIndex].codes[codeIndex].code =
document.getElementById("code-"+repIndex+"-"+codeIndex).value

reps[repIndex].codes[codeIndex].split =
document.getElementById("split-"+repIndex+"-"+codeIndex).value

saveData()

}

function deleteCode(repIndex,codeIndex){

reps[repIndex].codes.splice(codeIndex,1)

saveData()

}

function render(){

let container=document.getElementById("repContainer")
container.innerHTML=""

reps.forEach((rep,repIndex)=>{

let div=document.createElement("div")
div.className="rep-card"

let html=`

<h3>Sales Rep</h3>

First Name:
<input id="repFirst-${repIndex}" value="${rep.first}">

Last Name:
<input id="repLast-${repIndex}" value="${rep.last}">

<button onclick="updateRep(${repIndex})">Save</button>
<button onclick="deleteRep(${repIndex})">Delete Rep</button>

<h4>Rep Codes</h4>

`

rep.codes.forEach((c,codeIndex)=>{

html+=`

<div class="code-row">

Code:
<input id="code-${repIndex}-${codeIndex}" value="${c.code}">

Split %:
<input id="split-${repIndex}-${codeIndex}" value="${c.split}">

<button onclick="updateCode(${repIndex},${codeIndex})">Save</button>
<button onclick="deleteCode(${repIndex},${codeIndex})">Delete</button>

</div>

`

})

html+=`

<br>

<input id="newCode-${repIndex}" placeholder="Rep Code">
<input id="newSplit-${repIndex}" placeholder="Split %">

<button onclick="addRepCode(${repIndex})">Add Rep Code</button>

`

div.innerHTML=html
container.appendChild(div)

})

}

render()

</script>

</body>
</html>
