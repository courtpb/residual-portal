<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Users Management</title>
<style>
body{font-family:Arial;background:#f4f6f9;margin:0;}
header{background:#2c3e50;color:white;padding:15px;}
nav{background:#34495e;padding:10px;}
nav a{color:white;margin-right:15px;text-decoration:none;font-weight:bold;}
.container{padding:25px;}
input, select{padding:8px;margin:5px 0;border:1px solid #ccc;border-radius:4px;width:100%;}
button{background:#3498db;border:none;color:white;padding:10px 18px;cursor:pointer;border-radius:4px;margin-top:10px;}
button:hover{background:#2980b9;}
table{width:100%;border-collapse:collapse;margin-top:25px;background:white;}
th,td{padding:10px;border:1px solid #ddd;text-align:left;}
th{background:#ecf0f1;}
.editable{width:100%;}
</style>
</head>
<body>

<header><h2>Residual Portal</h2></header>
<nav>
<a href="dashboard.html">Dashboard</a>
<a href="residuals.html">Import Residuals</a>
<a href="my-residuals.html">My Residuals</a>
<a href="merchant-search.html">Merchant Search</a>
<a href="users.html">Users</a>
<a href="index.html">Logout</a>
</nav>

<div class="container">

<h3>Add / Update User</h3>
<label>Email:</label>
<input type="email" id="newEmail" placeholder="Email">
<label>Password:</label>
<input type="text" id="newPassword" placeholder="Password">
<label>Role:</label>
<select id="newRole">
<option value="rep">Sales Rep</option>
<option value="admin">Admin</option>
</select>
<label>Rep Codes (comma-separated for sales reps):</label>
<input type="text" id="newRepCodes" placeholder="e.g. 08040-004,08040-005">
<label>Residual Split % (for Sales Reps):</label>
<input type="number" id="newSplit" placeholder="e.g. 50" min="0" max="100">
<button id="addUserBtn">Add / Update User</button>

<h3>Existing Users</h3>
<table id="usersTable">
<thead>
<tr>
<th>Email</th>
<th>Role</th>
<th>Rep Codes</th>
<th>Split %</th>
<th>Actions</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

    // Initialize users storage if empty
    if(!localStorage.getItem("users")){
        let users = [
            {email:"admin@email.com",password:"portal123",role:"admin",repCodes:[],split:0}
        ]
        localStorage.setItem("users", JSON.stringify(users))
    }

    function loadUsers(){
        let users = JSON.parse(localStorage.getItem("users")) || []
        let tbody = document.querySelector("#usersTable tbody")
        tbody.innerHTML = ""
        users.forEach((u,index)=>{
            let row = document.createElement("tr")
            row.innerHTML = `
                <td><input class="editable" type="text" value="${u.email}" onchange="editUser(${index}, 'email', this.value)"></td>
                <td>
                    <select class="editable" onchange="editUser(${index}, 'role', this.value)">
                        <option value="admin" ${u.role==='admin'?'selected':''}>Admin</option>
                        <option value="rep" ${u.role==='rep'?'selected':''}>Sales Rep</option>
                    </select>
                </td>
                <td><input class="editable" type="text" value="${u.repCodes.join(', ')}" onchange="editUser(${index}, 'repCodes', this.value)"></td>
                <td><input class="editable" type="number" value="${u.split||0}" min="0" max="100" onchange="editUser(${index}, 'split', this.value)"></td>
                <td><button onclick="deleteUser(${index})">Delete</button></td>
            `
            tbody.appendChild(row)
        })
    }

    // Edit user inline
    window.editUser = function(index, field, value){
        let users = JSON.parse(localStorage.getItem("users")) || []
        if(field==='repCodes') value = value.split(",").map(s=>s.trim()).filter(s=>s)
        if(field==='split') value = parseFloat(value) || 0
        users[index][field] = value
        localStorage.setItem("users", JSON.stringify(users))
    }

    // Delete user
    window.deleteUser = function(index){
        if(!confirm("Are you sure you want to delete this user?")) return
        let users = JSON.parse(localStorage.getItem("users")) || []
        users.splice(index,1)
        localStorage.setItem("users", JSON.stringify(users))
        loadUsers()
    }

    // Add / Update user
    function addOrUpdateUser(){
        let email = document.getElementById("newEmail").value.trim().toLowerCase()
        let password = document.getElementById("newPassword").value
        let role = document.getElementById("newRole").value
        let repCodes = document.getElementById("newRepCodes").value.split(",").map(s=>s.trim()).filter(s=>s)
        let split = parseFloat(document.getElementById("newSplit").value) || 0

        if(!email || !password){
            alert("Email and password are required.")
            return
        }

        let users = JSON.parse(localStorage.getItem("users")) || []
        let existing = users.find(u=>u.email===email)
        if(existing){
            existing.password = password
            existing.role = role
            existing.repCodes = repCodes
            existing.split = split
        } else {
            users.push({email,password,role,repCodes,split})
        }
        localStorage.setItem("users", JSON.stringify(users))
        loadUsers()
        alert("User added/updated successfully.")
        document.getElementById("newEmail").value=""
        document.getElementById("newPassword").value=""
        document.getElementById("newRepCodes").value=""
        document.getElementById("newSplit").value=""
    }

    document.getElementById("addUserBtn").addEventListener("click", addOrUpdateUser)

    loadUsers()
});
</script>

</body>
</html>
