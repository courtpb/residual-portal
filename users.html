<!DOCTYPE html>
<html>
<head>
<title>Users</title>
<style>
body{font-family:Arial;background:#f4f6f9;padding:40px;}
.nav a{margin-right:10px;padding:8px 15px;background:#0073aa;color:white;border-radius:5px;text-decoration:none;}
.nav a.logout{background:#d00;}
.nav a:hover{background:#005fd1;}
h2{margin-top:20px;}
input,select,button{padding:5px;margin:3px;}
table{width:100%;border-collapse:collapse;margin-top:20px;background:white;}
th,td{border:1px solid #ddd;padding:8px;text-align:left;}
th{background:#0073aa;color:white;}
.autocomplete-suggestions{border:1px solid #ddd;background:white;position:absolute;z-index:1000;max-height:120px;overflow-y:auto;}
.autocomplete-suggestion{padding:5px;cursor:pointer;}
.autocomplete-suggestion:hover{background:#f0f0f0;}
</style>
</head>
<body>

<!-- NAVIGATION -->
<div class="nav">
  <a href="dashboard.html">Dashboard</a>
  <a href="residuals.html">Residuals</a>
  <a href="sales-reps.html">Sales Reps</a>
  <a href="users.html">Users</a>
  <a href="my-residuals.html">My Residuals</a>
  <a href="merchant-search.html">Merchant Search</a>
  <a href="change-password.html">Change Password</a>
  <a href="index.html" class="logout">Logout</a>
</div>

<h2>Users</h2>
<p>Create portal users with limited view permissions here.</p>

<!-- USER CREATION FORM -->
<h3>Add New User</h3>
Email / Username: <input id="userEmail" placeholder="user@example.com">
Permission Level: 
<select id="userRole">
  <option value="admin">Admin</option>
  <option value="salesrep">Sales Rep</option>
</select>
Assigned Rep: <input id="userRep" placeholder="Start typing rep name">
<div id="repSuggestions" class="autocomplete-suggestions"></div>
<button onclick="addUser()">Add User</button>

<!-- USER TABLE -->
<table>
<thead>
<tr>
<th>Username / Email</th>
<th>Permission Level</th>
<th>Assigned Rep</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="usersBody">
<tr><td colspan="4" style="text-align:center;">No users added yet.</td></tr>
</tbody>
</table>

<script>
// Load users and sales reps from localStorage
let users = JSON.parse(localStorage.getItem("users") || "[]");
let salesReps = JSON.parse(localStorage.getItem("salesReps") || "[]");

// AUTOCOMPLETE for Assigned Rep
const repInput = document.getElementById("userRep");
const suggestionsDiv = document.getElementById("repSuggestions");

repInput.addEventListener("input", function(){
    const val = this.value.toLowerCase();
    suggestionsDiv.innerHTML = "";
    if(!val) return;
    salesReps.forEach(rep=>{
        const fullName = rep.firstName + " " + rep.lastName;
        if(fullName.toLowerCase().includes(val)){
            const div = document.createElement("div");
            div.className="autocomplete-suggestion";
            div.textContent=fullName;
            div.onclick=function(){repInput.value=fullName;suggestionsDiv.innerHTML="";}
            suggestionsDiv.appendChild(div);
        }
    });
});

// Close suggestions if clicked outside
document.addEventListener("click", e=>{if(e.target!==repInput){suggestionsDiv.innerHTML="";}});

// USER TABLE FUNCTIONS
function renderUsers(){
    const tbody = document.getElementById("usersBody");
    tbody.innerHTML = "";
    if(users.length===0){
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No users added yet.</td></tr>';
        return;
    }
    users.forEach((u,i)=>{
        tbody.innerHTML += `<tr>
            <td>${u.email}</td>
            <td>${u.role}</td>
            <td>${u.rep}</td>
            <td>
                <button onclick="editUser(${i})">Edit</button>
                <button onclick="deleteUser(${i})">Delete</button>
            </td>
        </tr>`;
    });
}

function addUser(){
    const email = document.getElementById("userEmail").value.trim();
    const role = document.getElementById("userRole").value;
    const rep = document.getElementById("userRep").value.trim();
    if(!email){alert("Enter email"); return;}
    users.push({email,role,rep});
    localStorage.setItem("users",JSON.stringify(users));
    document.getElementById("userEmail").value="";
    document.getElementById("userRep").value="";
    renderUsers();
}

function deleteUser(i){
    if(confirm("Delete this user?")){
        users.splice(i,1);
        localStorage.setItem("users",JSON.stringify(users));
        renderUsers();
    }
}

function editUser(i){
    const u = users[i];
    const newEmail = prompt("Edit Email:", u.email);
    if(newEmail) u.email = newEmail;
    const newRole = prompt("Edit Role (admin/salesrep):", u.role);
    if(newRole) u.role = newRole;
    const newRep = prompt("Edit Assigned Rep:", u.rep);
    if(newRep !== null) u.rep = newRep;
    localStorage.setItem("users",JSON.stringify(users));
    renderUsers();
}

// initial render
renderUsers();
</script>

</body>
</html>
