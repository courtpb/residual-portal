<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Users Management</title>
<style>
body{font-family:Arial;background:#f4f6f9;margin:0;}
header{background:#2c3e50;color:white;padding:15px;}
nav{background:#34495e;padding:10px;}
nav a{color:white;margin-right:15px;text-decoration:none;font-weight:bold;}
.container{padding:25px;}
input, select{padding:8px;margin:5px 0;border:1px solid #ccc;border-radius:4px;width:100%;}
button{background:#3498db;border:none;color:white;padding:10px 18px;cursor:pointer;border-radius:4px;margin-top:10px;}
button:hover{background:#2980b9;}
table{width:100%;border-collapse:collapse;margin-top:25px;background:white;}
th,td{padding:10px;border:1px solid #ddd;text-align:left;}
th{background:#ecf0f1;}
</style>
</head>
<body>
<header><h2>Residual Portal</h2></header>
<nav>
<a href="dashboard.html">Dashboard</a>
<a href="residuals.html">Import Residuals</a>
<a href="my-residuals.html">My Residuals</a>
<a href="merchant-search.html">Merchant Search</a>
<a href="users.html">Users</a>
<a href="index.html">Logout</a>
</nav>

<div class="container">
<h3>Add New User</h3>
<label>Email:</label>
<input type="email" id="newEmail" placeholder="Email">
<label>Password:</label>
<input type="password" id="newPassword" placeholder="Password">
<label>Role:</label>
<select id="newRole">
<option value="rep">Sales Rep</option>
<option value="admin">Admin</option>
</select>
<label>Rep Codes (comma-separated for sales reps):</label>
<input type="text" id="newRepCodes" placeholder="e.g. 08040-004,08040-005">

<button onclick="addUser()">Add User</button>

<h3>Existing Users</h3>
<table id="usersTable">
<thead>
<tr>
<th>Email</th><th>Role</th><th>Rep Codes</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>
function loadUsers(){
    let users = JSON.parse(localStorage.getItem("users")) || []
    let tbody = document.querySelector("#usersTable tbody")
    tbody.innerHTML = ""
    users.forEach(u=>{
        let row = document.createElement("tr")
        row.innerHTML = `<td>${u.email}</td><td>${u.role}</td><td>${u.repCodes.join(", ")}</td>`
        tbody.appendChild(row)
    })
}

function addUser(){
    let email = document.getElementById("newEmail").value.trim().toLowerCase()
    let password = document.getElementById("newPassword").value
    let role = document.getElementById("newRole").value
    let repCodes = document.getElementById("newRepCodes").value.split(",").map(s=>s.trim()).filter(s=>s)

    if(!email || !password) return alert("Email and password are required.")

    let users = JSON.parse(localStorage.getItem("users")) || []
    if(users.find(u=>u.email===email)) return alert("User already exists.")

    users.push({email,password,role,repCodes})
    localStorage.setItem("users", JSON.stringify(users))
    loadUsers()
    alert("User added successfully.")
    document.getElementById("newEmail").value=""
    document.getElementById("newPassword").value=""
    document.getElementById("newRepCodes").value=""
}

loadUsers()
</script>
</body>
</html>
