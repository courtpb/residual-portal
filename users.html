<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Users</title>

<style>
body{font-family:Arial;background:#f4f6f9;margin:0;}
header{background:#2c3e50;color:white;padding:15px;}
nav{background:#34495e;padding:10px;}
nav a{color:white;margin-right:15px;text-decoration:none;font-weight:bold;}
.container{padding:20px;}
input,select{padding:8px;margin:5px 0;width:100%;border-radius:4px;border:1px solid #ccc;}
button{background:#3498db;color:white;padding:10px 15px;border:none;border-radius:4px;cursor:pointer;margin-top:10px;}
table{width:100%;border-collapse:collapse;margin-top:20px;}
th,td{border:1px solid #ddd;padding:8px;text-align:left;}
th{background:#ecf0f1;}
</style>
</head>

<body>

<header><h2>Residual Portal</h2></header>

<nav>
<a href="dashboard.html">Dashboard</a>
<a href="residuals.html">Import Residuals</a>
<a href="my-residuals.html">My Residuals</a>
<a href="merchant-search.html">Merchant Search</a>
<a href="users.html">Users</a>
<a href="index.html">Logout</a>
</nav>

<div class="container">

<h3>Add / Update User</h3>

<label>Email:</label>
<input type="email" id="email">

<label>Password:</label>
<input type="text" id="password">

<label>Role:</label>
<select id="role">
<option value="rep">Sales Rep</option>
<option value="admin">Admin</option>
</select>

<label>Rep Codes:</label>
<input type="text" id="repCodes" placeholder="08040-004,08040-005">

<label>Split %:</label>
<input type="number" id="split" placeholder="50">

<button id="addUserBtn">Add / Update User</button>

<h3>Existing Users</h3>

<table>
<thead>
<tr>
<th>Email</th>
<th>Role</th>
<th>Rep Codes</th>
<th>Split</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="userTable"></tbody>
</table>

</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

function loadUsers(){
    let users = JSON.parse(localStorage.getItem("users")) || []
    let table = document.getElementById("userTable")
    table.innerHTML = ""

    users.forEach((u,i)=>{
        let row = `
        <tr>
        <td>${u.email}</td>
        <td>${u.role}</td>
        <td>${(u.repCodes||[]).join(", ")}</td>
        <td>${u.split||0}%</td>
        <td>
            <button onclick="editUser(${i})">Edit</button>
            <button onclick="deleteUser(${i})">Delete</button>
        </td>
        </tr>
        `
        table.innerHTML += row
    })
}

window.editUser = function(i){
    let users = JSON.parse(localStorage.getItem("users"))
    let u = users[i]

    document.getElementById("email").value = u.email
    document.getElementById("password").value = u.password
    document.getElementById("role").value = u.role
    document.getElementById("repCodes").value = (u.repCodes||[]).join(", ")
    document.getElementById("split").value = u.split || 0
}

window.deleteUser = function(i){
    let users = JSON.parse(localStorage.getItem("users"))
    users.splice(i,1)
    localStorage.setItem("users", JSON.stringify(users))
    loadUsers()
}

document.getElementById("addUserBtn").addEventListener("click", function(){

    let email = document.getElementById("email").value.trim().toLowerCase()
    let password = document.getElementById("password").value
    let role = document.getElementById("role").value
    let repCodes = document.getElementById("repCodes").value.split(",").map(x=>x.trim()).filter(x=>x)
    let split = parseFloat(document.getElementById("split").value) || 0

    if(!email || !password){
        alert("Email + password required")
        return
    }

    let users = JSON.parse(localStorage.getItem("users")) || []
    let existing = users.find(u=>u.email===email)

    if(existing){
        existing.password = password
        existing.role = role
        existing.repCodes = repCodes
        existing.split = split
    } else {
        users.push({email,password,role,repCodes,split})
    }

    localStorage.setItem("users", JSON.stringify(users))

    document.getElementById("email").value=""
    document.getElementById("password").value=""
    document.getElementById("repCodes").value=""
    document.getElementById("split").value=""

    loadUsers()
})

loadUsers()

})
</script>

</body>
</html>
